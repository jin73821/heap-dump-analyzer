<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Files — Heap Dump Analyzer</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: 'Segoe UI', 'Trebuchet MS', sans-serif; font-size: 14px;
               color: #1F2937; background: #F3F4F6; line-height: 1.5; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 52px;
                  background: #fff; border-bottom: 1px solid #E5E7EB;
                  display: flex; align-items: center; justify-content: space-between;
                  padding: 0 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .topbar-brand { display: flex; align-items: center; gap: 10px; }
        .topbar-logo { width: 30px; height: 30px; background: #2563EB; border-radius: 7px;
                       display: flex; align-items: center; justify-content: center; }
        .topbar-logo svg { width: 16px; height: 16px; fill: white; }
        .topbar-title { font-size: 16px; font-weight: 700; }
        .topbar-right { display: flex; align-items: center; gap: 6px; }
        .topbar-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #E5E7EB;
                      border-radius: 6px; background: transparent; color: #6B7280;
                      cursor: pointer; text-decoration: none; display: inline-block; }
        .topbar-btn:hover { background: #F9FAFB; }
        .container { max-width: 960px; margin: 0 auto; padding: 68px 20px 40px; }
        .page-hdr { display: flex; align-items: center; justify-content: space-between;
                    margin-bottom: 20px; }
        .page-ttl { font-size: 18px; font-weight: 700; }
        .page-stats { display: flex; gap: 16px; }
        .page-stat { font-size: 12px; color: #6B7280; }
        .page-stat strong { color: #1F2937; }
        .search-bar { width: 100%; padding: 10px 14px; border: 1px solid #E5E7EB;
                      border-radius: 8px; font-size: 13px; margin-bottom: 16px;
                      outline: none; background: #fff; }
        .search-bar:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .panel { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 16px; }
        .file-item { display: flex; align-items: center; gap: 10px;
                     padding: 10px 0; border-bottom: 1px solid #F3F4F6; }
        .file-item:last-child { border-bottom: none; }
        .hdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .hd-ok   { background: #10B981; }
        .hd-warn { background: #F59E0B; }
        .hd-err  { background: #EF4444; }
        .fname { font-size: 13px; font-weight: 500; flex: 1; min-width: 0;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .fname-err { color: #DC2626; }
        .fsize { font-size: 12px; color: #9CA3AF; flex-shrink: 0; min-width: 60px; }
        .fdate { font-size: 12px; color: #9CA3AF; flex-shrink: 0; min-width: 90px; }
        .fbadge { font-size: 11px; padding: 3px 10px; border-radius: 20px;
                  flex-shrink: 0; font-weight: 500; text-decoration: none; cursor: pointer; }
        .fb-ok   { background: #D1FAE5; color: #065F46; }
        .fb-err  { background: #FEE2E2; color: #7F1D1D; }
        .fb-analyze { background: #DBEAFE; color: #1E40AF; }
        .file-actions { display: flex; gap: 3px; flex-shrink: 0; align-items: center; }
        .fb { width: 26px; height: 26px; border: 1px solid #E5E7EB; border-radius: 5px;
              display: flex; align-items: center; justify-content: center; cursor: pointer;
              background: transparent; text-decoration: none; }
        .fb:hover { border-color: #93C5FD; }
        .fb.v  { background: #059669; border-color: #059669; }
        .fb.v:hover { background: #047857; }
        .fb.v svg { stroke: white; }
        .fb.p  { background: #2563EB; border-color: #2563EB; }
        .fb.p:hover { background: #1D4ED8; }
        .fb.p svg { stroke: white; }
        .fb.e  { background: #EF4444; border-color: #EF4444; }
        .fb.e:hover { background: #DC2626; }
        .fb.e svg { stroke: white; }
        .fb.d:hover { border-color: #FCA5A5; background: #FEF2F2; }
        .fb.d:hover svg { stroke: #EF4444; }
        .fb svg { width: 12px; height: 12px; stroke: #6B7280; fill: none; stroke-width: 1.5; }
        .no-match { text-align: center; padding: 32px; color: #9CA3AF; font-size: 13px; display: none; }
        .legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6B7280; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .ld-ok   { background: #10B981; }
        .ld-warn { background: #F59E0B; }
        .ld-err  { background: #EF4444; }
        .gz-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 4px;
                    background: #DBEAFE; color: #1E40AF; font-weight: 600; margin-left: 4px; vertical-align: middle; }
        .fsize-detail { font-size: 11px; color: #9CA3AF; flex-shrink: 0; min-width: 60px; text-align: right; }
        .fsize-detail .sz-orig { color: #6B7280; }
        .fsize-detail .sz-arrow { color: #D1D5DB; margin: 0 2px; }
        .fsize-detail .sz-comp { color: #2563EB; font-weight: 500; }
        .fi-deleted { opacity: 0.65; }
        .fi-del-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px;
                        background: #F3F4F6; color: #6B7280; flex-shrink: 0; margin-left: 2px; }

        /* Delete confirm modal */
        .modal-ov { display: none; position: fixed; inset: 0; z-index: 200;
                    background: rgba(0,0,0,.35); align-items: center; justify-content: center; }
        .modal-ov.open { display: flex; animation: fadeIn .15s ease; }
        .modal-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 380px;
                     width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,.15); text-align: center; }
        .modal-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
        .modal-box p { font-size: 13px; color: #6B7280; margin-bottom: 16px; word-break: break-all; }
        .modal-btns { display: flex; gap: 8px; justify-content: center; }
        .modal-btns button { padding: 7px 20px; border-radius: 7px; font-size: 13px;
                             border: none; cursor: pointer; font-weight: 500; }
        .btn-cancel { background: #F3F4F6; color: #374151; }
        .btn-cancel:hover { background: #E5E7EB; }
        .btn-delete { background: #EF4444; color: #fff; }
        .btn-delete:hover { background: #DC2626; }
        .btn-download { background: #2563EB; color: #fff; }
        .btn-download:hover { background: #1D4ED8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (min-width: 1024px) {
            .fname { font-size: 14px; }
            .fsize, .fdate { font-size: 13px; }
        }
        @media (max-width: 640px) {
            .fdate { display: none; }
            .page-stats { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">
        <div class="topbar-logo">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <span class="topbar-title">Heap Dump Analyzer</span>
    </div>
    <div class="topbar-right">
        <a href="/" class="topbar-btn">← Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="page-hdr">
        <div class="page-ttl">Analysis Files</div>
        <div class="page-stats">
            <span class="page-stat"><strong th:text="${fileCount}">0</strong> files</span>
            <span class="page-stat"><strong th:text="${analyzedCount}">0</strong> analyzed</span>
            <span class="page-stat"><strong th:text="${totalSize}">0</strong> original</span>
            <span th:if="${hasCompressed}" class="page-stat" style="color:#2563EB">
                <strong th:text="${diskSize}">0</strong> disk</span>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot ld-ok"></div>분석 완료</div>
        <div class="legend-item"><div class="legend-dot ld-warn"></div>미분석</div>
        <div class="legend-item"><div class="legend-dot ld-err"></div>분석 오류</div>
    </div>

    <input type="text" class="search-bar" id="searchInput"
           placeholder="Search files..." oninput="filterFiles()">

    <div class="panel">
        <div th:each="h : ${analysisHistory}" class="file-item" th:classappend="${h.fileDeleted} ? 'fi-deleted'"
             th:data-name="${h.filename}">
            <div class="hdot hd-ok"   th:if="${h.status == 'SUCCESS'}"></div>
            <div class="hdot hd-err"  th:if="${h.status == 'ERROR'}"></div>
            <div class="hdot hd-warn" th:if="${h.status == 'NOT_ANALYZED'}"></div>
            <div class="hdot hd-warn" th:unless="${h.status == 'SUCCESS' or h.status == 'ERROR' or h.status == 'NOT_ANALYZED'}"></div>
            <div class="fname" th:classappend="${h.status == 'ERROR'} ? 'fname-err'" th:text="${h.filename}">dump.hprof</div>
            <span th:if="${h.fileDeleted}" class="fi-del-badge">deleted</span>
            <div th:if="${h.compressed}" class="fsize-detail">
                <span class="sz-orig" th:text="${h.formattedOriginalSize}">500 MB</span>
                <span class="sz-arrow">→</span>
                <span class="sz-comp" th:text="${h.formattedCompressedSize}">120 MB</span>
                <span class="gz-badge">GZ</span>
            </div>
            <div th:unless="${h.compressed}" class="fsize" th:text="${h.formattedSize}">157 MB</div>
            <div class="fdate" th:text="${h.formattedDate}">03-18 10:00</div>
            <div class="file-actions">
                <!-- 결과 보기 (SUCCESS — 파일 삭제 여부 무관) -->
                <a th:if="${h.status == 'SUCCESS'}"
                   th:href="@{/analyze/result/{f}(f=${h.filename})}"
                   class="fb v" title="View Result">
                    <svg viewBox="0 0 12 12"><path d="M1 6s2-4 5-4 5 4 5 4-2 4-5 4-5-4-5-4z"/><circle cx="6" cy="6" r="1.5"/></svg>
                </a>
                <!-- 에러 보기 (ERROR + 파일 존재) -->
                <a th:if="${h.status == 'ERROR' and !h.fileDeleted}"
                   th:href="@{/analyze/result/{f}(f=${h.filename})}"
                   class="fb e" title="View Error">
                    <svg viewBox="0 0 12 12"><circle cx="5" cy="5" r="4"/><path d="M8 8l3 3"/></svg>
                </a>
                <!-- 분석 (미분석 + 파일 존재) -->
                <a th:if="${h.status == 'NOT_ANALYZED' and !h.fileDeleted}"
                   th:href="@{/analyze/{f}(f=${h.filename})}"
                   class="fb p" title="Analyze">
                    <svg viewBox="0 0 12 12"><circle cx="5" cy="5" r="4"/><path d="M8 8l3 3"/></svg>
                </a>
                <!-- 다운로드/삭제 (파일 존재 시에만) -->
                <a th:if="${!h.fileDeleted}" href="#" class="fb" title="Download"
                   th:data-filename="${h.filename}" th:data-size="${h.formattedSize}"
                   onclick="showDownloadModal(this.dataset.filename,this.dataset.size);return false;">
                    <svg viewBox="0 0 12 12"><path d="M6 2v6M3 7l3 3 3-3"/><path d="M2 11h8"/></svg>
                </a>
                <a th:if="${!h.fileDeleted}" href="#" class="fb d" title="Delete"
                   th:data-filename="${h.filename}"
                   onclick="confirmDelete(this.dataset.filename);return false;">
                    <svg viewBox="0 0 12 12"><path d="M2 3h8M5 3V2h2v1M4 3v7h4V3"/></svg>
                </a>
            </div>
        </div>
        <div class="no-match" id="noMatch">No files matching your search.</div>
    </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-ov" id="deleteModal">
    <div class="modal-box">
        <h3>파일 삭제</h3>
        <p>정말 <strong id="delFileName"></strong> 파일을 삭제하시겠습니까?<br>힙덤프 파일만 삭제되며 분석 결과는 보존됩니다.</p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeDeleteModal()">취소</button>
            <button class="btn-delete" id="btnConfirmDel">삭제</button>
        </div>
    </div>
</div>

<!-- Download confirm modal -->
<div class="modal-ov" id="downloadModal" onclick="if(event.target===this)closeDownloadModal()">
    <div class="modal-box">
        <h3>파일 다운로드</h3>
        <div style="background:#f9fafb;border-radius:8px;padding:12px 16px;margin-bottom:14px;text-align:left">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
                <span style="color:#6b7280">Filename</span>
                <span id="dlModalFilename" style="font-weight:700;font-size:12px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">-</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px">
                <span style="color:#6b7280">File Size</span>
                <span id="dlModalSize" style="font-weight:700;font-size:12px">-</span>
            </div>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeDownloadModal()">취소</button>
            <button class="btn-download" id="btnConfirmDl">다운로드</button>
        </div>
    </div>
</div>

<script>
var _delTarget = '';
function confirmDelete(filename) {
    _delTarget = filename;
    document.getElementById('delFileName').textContent = filename;
    document.getElementById('deleteModal').classList.add('open');
}
function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('open');
    _delTarget = '';
}
document.getElementById('btnConfirmDel').onclick = function() {
    if (_delTarget) {
        var f = document.createElement('form');
        f.method = 'POST'; f.action = '/delete/' + encodeURIComponent(_delTarget); f.style.display = 'none';
        document.body.appendChild(f); f.submit();
    }
};
document.getElementById('deleteModal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteModal();
});

var _dlFilename = '';
function showDownloadModal(filename, size) {
    _dlFilename = filename;
    document.getElementById('dlModalFilename').textContent = filename;
    document.getElementById('dlModalSize').textContent = size;
    document.getElementById('downloadModal').classList.add('open');
}
function closeDownloadModal() {
    document.getElementById('downloadModal').classList.remove('open');
    _dlFilename = '';
}
document.getElementById('btnConfirmDl').onclick = function() {
    if (_dlFilename) {
        closeDownloadModal();
        window.location.href = '/download/' + encodeURIComponent(_dlFilename);
    }
};

function filterFiles() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    var items = document.querySelectorAll('.file-item');
    var visible = 0;
    items.forEach(function(el) {
        var name = el.getAttribute('data-name').toLowerCase();
        var show = name.indexOf(q) !== -1;
        el.style.display = show ? '' : 'none';
        if (show) visible++;
    });
    document.getElementById('noMatch').style.display = visible === 0 ? 'block' : 'none';
}
</script>

</body>
</html>

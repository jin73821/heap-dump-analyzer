<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/common.css?v=2026-06-28">
    <title>Transfer Logs — Heap Dump Analyzer</title>
    <style>
        /* topbar 는 anti-wrap 확장이 있어 인라인 유지 */
        .topbar { position: fixed; top: 0; left: var(--banner-w, 220px); right: 0; z-index: 100; height: 52px;
                  transition: left .25s cubic-bezier(.4,0,.2,1);
                  background: #fff; border-bottom: 1px solid #E5E7EB;
                  display: flex; align-items: center; justify-content: space-between;
                  padding: 0 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); gap: 10px; }
        .topbar-brand { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1 1 auto; }
        .topbar-title { font-size: 16px; font-weight: 700;
                        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .topbar-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #E5E7EB;
                      border-radius: 6px; background: transparent; color: #6B7280;
                      cursor: pointer; text-decoration: none; }
        .topbar-btn:hover { background: #F9FAFB; }

        .container { max-width: 1440px; margin: 0 auto; padding: 68px 20px 40px;
                     padding-left: calc(var(--banner-w, 220px) + 20px);
                     transition: padding-left .25s cubic-bezier(.4,0,.2,1); }
        .page-hdr { display: flex; align-items: center; justify-content: space-between;
                    margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .page-ttl { font-size: 18px; font-weight: 700; }

        /* ── KPI cards ────────────────────────────────────── */
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
        .kpi-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;
                    padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
        .kpi-icon { width: 38px; height: 38px; border-radius: 10px; display: flex;
                    align-items: center; justify-content: center; flex-shrink: 0; }
        .kpi-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
        .kpi-blue  { background: #DBEAFE; color: #1D4ED8; }
        .kpi-green { background: #D1FAE5; color: #065F46; }
        .kpi-red   { background: #FEE2E2; color: #991B1B; }
        .kpi-text { display: flex; flex-direction: column; }
        .kpi-label { font-size: 11px; color: #6B7280; text-transform: uppercase; letter-spacing: .5px;
                     font-weight: 600; }
        .kpi-value { font-size: 22px; font-weight: 700; color: #1F2937; line-height: 1.2; margin-top: 2px; }

        /* ── Table toolbar ────────────────────────────────── */
        .table-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .search-bar { flex: 1 1 220px; min-width: 200px; padding: 7px 12px; font-size: 13px;
                      border: 1px solid #D1D5DB; border-radius: 6px; background: #fff; }
        .search-bar:focus { outline: none; border-color: #2563EB; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
        .toolbar-sel { padding: 7px 10px; font-size: 13px; border: 1px solid #D1D5DB; border-radius: 6px;
                       background: #fff; cursor: pointer; min-width: 130px; }
        .toolbar-sel:focus { outline: none; border-color: #2563EB; }
        .page-size-wrap { display: inline-flex; align-items: center; gap: 6px; }
        .page-size-label { font-size: 12px; color: #6B7280; }
        .export-wrap { position: relative; }
        .export-btn { padding: 7px 14px; font-size: 13px; border: 1px solid #D1D5DB; border-radius: 6px;
                      background: #fff; cursor: pointer; font-weight: 500; }
        .export-btn:hover { background: #F9FAFB; }
        .export-menu { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px;
                       background: #fff; border: 1px solid #E5E7EB; border-radius: 6px; min-width: 140px;
                       box-shadow: 0 4px 12px rgba(0,0,0,.08); z-index: 20; }
        .export-menu.open { display: block; }
        .export-menu a { display: block; padding: 8px 14px; font-size: 13px; color: #374151;
                         text-decoration: none; cursor: pointer; }
        .export-menu a:hover { background: #F3F4F6; }

        /* Export 모달 버튼 기본 형태 — common.css .mbtn-* 는 색상만 제공하므로
           padding/border/radius/font 는 페이지에서 지정 (cascade override 패턴) */
        #exportModal .modal-box button {
            font-size: 13px; padding: 8px 16px; border-radius: 7px; border: none;
            cursor: pointer; font-weight: 600; font-family: inherit; line-height: 1.2;
        }

        /* ── Table ────────────────────────────────────────── */
        .panel { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; overflow: hidden; }
        .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .ltable { width: 100%; border-collapse: collapse; font-size: 13px; }
        .ltable th { padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600;
                     color: #6B7280; text-transform: uppercase; letter-spacing: .3px;
                     background: #F9FAFB; border-bottom: 1px solid #E5E7EB; white-space: nowrap; }
        .ltable th.sortable { cursor: pointer; user-select: none; }
        .ltable th.sortable:hover { background: #F3F4F6; }
        .ltable th .sort-arrow { display: inline-block; margin-left: 4px; color: #D1D5DB; font-size: 10px; }
        .ltable th.sort-active { color: #2563EB; }
        .ltable th.sort-active .sort-arrow { color: #2563EB; }
        .ltable td { padding: 10px 14px; border-bottom: 1px solid #F3F4F6; vertical-align: middle; }
        .ltable tbody tr:last-child td { border-bottom: none; }
        .ltable tbody tr:hover { background: #FAFAFA; }
        .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-failed { background: #FEE2E2; color: #991B1B; }
        .badge-progress { background: #FEF3C7; color: #92400E; }
        .td-mono { font-family: 'JetBrains Mono','SF Mono','Fira Code',monospace; font-size: 12px; }
        .td-num { color: #6B7280; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
        .td-server { font-weight: 500; color: #2563EB; }
        .td-name { font-weight: 500; max-width: 240px; overflow: hidden; text-overflow: ellipsis;
                   white-space: nowrap; }
        .td-path { font-size: 11px; color: #6B7280; max-width: 360px; overflow: hidden;
                   text-overflow: ellipsis; white-space: nowrap; font-family: 'JetBrains Mono', monospace;
                   display: inline-block; vertical-align: middle; }
        /* 잘린 경로(.is-truncated) 만 hover 시 펼침 및 cursor: help */
        .td-path.is-truncated { cursor: help; }
        .td-path.is-truncated:hover { white-space: normal; word-break: break-all; max-width: 480px; }
        /* 에러 컬럼 — 버튼 + 팝오버 (긴 메시지로 다른 행 높이가 부풀지 않도록) */
        .err-btn { font-size: 11px; padding: 3px 9px; border-radius: 14px;
                   background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5;
                   cursor: pointer; font-weight: 600; white-space: nowrap; line-height: 1.2; }
        .err-btn:hover { background: #FECACA; }
        .err-btn:focus { outline: none; box-shadow: 0 0 0 3px rgba(239,68,68,.25); }
        .err-dash { color: #9CA3AF; font-size: 12px; }

        .err-pop { position: absolute; z-index: 1000; max-width: 520px; min-width: 260px;
                   background: #fff; border: 1px solid #FCA5A5; border-radius: 8px;
                   box-shadow: 0 8px 24px rgba(0,0,0,.15); padding: 0;
                   font-size: 12px; color: #1F2937; display: none; }
        .err-pop.show { display: block; }
        .err-pop-hdr { display: flex; align-items: center; justify-content: space-between;
                       padding: 8px 12px; background: #FEF2F2; border-bottom: 1px solid #FCA5A5;
                       border-radius: 8px 8px 0 0; }
        .err-pop-ttl { font-weight: 600; color: #991B1B; font-size: 12px; }
        .err-pop-act { display: flex; gap: 6px; }
        .err-pop-btn { background: transparent; border: 1px solid #D1D5DB; padding: 2px 8px;
                       font-size: 11px; border-radius: 4px; cursor: pointer; color: #374151; }
        .err-pop-btn:hover { background: #F3F4F6; }
        .err-pop-body { padding: 10px 12px; max-height: 320px; overflow: auto;
                        white-space: pre-wrap; word-break: break-all;
                        font-family: 'JetBrains Mono','SF Mono',monospace; font-size: 12px;
                        color: #DC2626; line-height: 1.55; }

        .empty-state { padding: 48px 24px; text-align: center; color: #9CA3AF; font-size: 14px; }
        .loading-state { padding: 48px 24px; text-align: center; color: #6B7280; font-size: 13px; }

        /* ── Pagination ───────────────────────────────────── */
        .pagination-bar { display: none; margin-top: 14px; padding: 10px 14px; gap: 12px;
                          align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .pagination-bar.show { display: flex; }
        .pg-info { font-size: 12px; color: #6B7280; }
        .pg-list { display: flex; gap: 4px; flex-wrap: wrap; }
        .pg-btn { min-width: 32px; padding: 5px 10px; font-size: 12px; border: 1px solid #D1D5DB;
                  border-radius: 6px; background: #fff; cursor: pointer; color: #374151; }
        .pg-btn:hover:not(:disabled) { background: #F3F4F6; }
        .pg-btn.active { background: #2563EB; color: #fff; border-color: #2563EB; font-weight: 600; }
        .pg-btn:disabled { opacity: .5; cursor: not-allowed; }
        .pg-ellipsis { padding: 5px 4px; color: #9CA3AF; font-size: 12px; }

        @media (max-width: 900px) {
            .topbar { left: 0; }
            .container { padding-left: 20px; padding-right: 14px; }
            .ltable { min-width: 880px; }
        }
        @media (max-width: 768px) {
            .kpi-grid { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
            .kpi-card { padding: 10px 12px; }
            .kpi-icon { width: 30px; height: 30px; }
            .kpi-icon svg { width: 16px; height: 16px; }
            .kpi-value { font-size: 18px; }
            .page-hdr { margin-bottom: 14px; }
            .page-ttl { font-size: 16px; }
            .container { padding: 64px 14px 32px; }
        }
        @media (max-width: 640px) {
            .topbar { padding: 0 12px; gap: 8px; }
            .topbar-title { font-size: 15px; }
            .topbar-right { gap: 4px; }
            .topbar-right .topbar-btn { padding: 5px 8px; font-size: 11px; }
            /* Total/Success/Failed 를 한 줄(3등분)로 유지 — 콤팩트 세로 카드 */
            .kpi-grid { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
            .kpi-card { flex-direction: column; align-items: flex-start; gap: 4px; padding: 10px 10px; }
            .kpi-icon { width: 26px; height: 26px; border-radius: 7px; }
            .kpi-icon svg { width: 14px; height: 14px; }
            .kpi-value { font-size: 17px; }
            .kpi-label { font-size: 10px; letter-spacing: .3px; }
            .ltable .col-hide-sm { display: none; }
            .ltable { min-width: 720px; }
            /* 콤팩트 3행 툴바: (1) 검색 100% / (2) 상태·서버 50%씩 / (3) 행표시·Export 50%씩 */
            .table-toolbar { gap: 8px; }
            .search-bar { flex: 1 1 100%; width: 100%; min-width: 0; padding: 8px 12px; font-size: 13px; }
            .toolbar-sel { flex: 1 1 calc(50% - 4px); width: auto; min-width: 0; padding: 7px 10px; font-size: 12px; }
            .page-size-wrap { flex: 1 1 calc(50% - 4px); justify-content: space-between; gap: 6px; }
            .page-size-wrap .toolbar-sel { flex: 0 0 80px; min-width: 60px; }
            .page-size-label { font-size: 11px; }
            .export-wrap { flex: 1 1 calc(50% - 4px); }
            .export-btn { width: 100%; padding: 7px 12px; font-size: 12px; }
            .export-menu { left: 0; right: 0; }
            .pagination-bar { flex-direction: column; align-items: stretch; gap: 8px; }
            .pg-info { text-align: center; }
            .pg-list { justify-content: center; flex-wrap: wrap; }
            .topbar { padding: 0 12px; }
            .topbar-title { font-size: 15px; }
            .topbar-btn { padding: 5px 8px; }
        }
        @media (min-width: 1024px) {
            .ltable { font-size: 14px; }
            .ltable th { font-size: 12px; padding: 12px 16px; }
            .ltable td { padding: 12px 16px; }
            .page-ttl { font-size: 20px; }
            .badge { font-size: 12px; }
            .td-mono { font-size: 13px; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/banner :: banner}"></div>

<div class="topbar">
    <div class="topbar-brand">
        <button class="gb-menu-btn" id="menuBtn" onclick="toggleMobileBanner()" aria-label="Menu"><span></span><span></span><span></span></button>
        <span class="topbar-title">Transfer Logs</span>
    </div>
    <div class="topbar-right">
        <a href="/servers" class="topbar-btn">&larr; Servers</a>
        <a href="/" class="topbar-btn">&larr; Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="page-hdr">
        <div class="page-ttl">Transfer Logs</div>
    </div>

    <!-- KPI 카드 (Total / Success / Failed) -->
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-icon kpi-blue">
                <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <div class="kpi-text">
                <span class="kpi-label">Total</span>
                <span class="kpi-value" id="kpiTotal">-</span>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon kpi-green">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="kpi-text">
                <span class="kpi-label">Success</span>
                <span class="kpi-value" id="kpiSuccess">-</span>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon kpi-red">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
            <div class="kpi-text">
                <span class="kpi-label">Failed</span>
                <span class="kpi-value" id="kpiFailed">-</span>
            </div>
        </div>
    </div>

    <!-- Toolbar (검색/상태/서버/페이지사이즈/Export) -->
    <div class="table-toolbar">
        <input type="text" class="search-bar" id="searchInput"
               placeholder="파일명·경로·에러 메시지로 검색..." oninput="onSearchInput()">
        <select class="toolbar-sel" id="statusSel" onchange="onStatusChange()">
            <option value="">상태: 전체</option>
            <option value="SUCCESS">SUCCESS</option>
            <option value="FAILED">FAILED</option>
            <option value="IN_PROGRESS">IN PROGRESS</option>
        </select>
        <select class="toolbar-sel" id="serverSel" onchange="onServerChange()">
            <option value="">서버: 전체</option>
            <option th:each="s : ${servers}" th:value="${s.id}" th:text="${s.name}">Server1</option>
        </select>
        <div class="page-size-wrap">
            <span class="page-size-label">행 표시</span>
            <select class="toolbar-sel" id="pageSizeSel" onchange="onPageSizeChange()" style="min-width: 80px">
                <option value="20" selected>20</option>
                <option value="30">30</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
        <div class="export-wrap" id="exportWrap">
            <button class="export-btn" onclick="toggleExportMenu(event)">Export &#9662;</button>
            <div class="export-menu" id="exportMenu">
                <a onclick="exportData('csv')">CSV 다운로드</a>
                <a onclick="exportData('json')">JSON 다운로드</a>
            </div>
        </div>
    </div>

    <!-- 기간선택 (KRDS 캘린더) — startedAt 기준 -->
    <div class="date-filter-row" id="dateFilterRow">
        <div class="form-tit"><label for="dateStart">기간선택</label></div>
        <div class="form-conts calendar-conts">
            <div class="calendar-range">
                <input type="text" class="cal-text" id="dateStart" placeholder="시작일" readonly aria-label="시작일">
                <span class="calendar-input-sep">~</span>
                <input type="text" class="cal-text" id="dateEnd" placeholder="종료일" readonly aria-label="종료일">
                <button type="button" class="form-btn-datepicker" onclick="Calendar.open()" aria-label="달력 열기">
                    <span class="sr-only">달력 열기</span>
                    <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2" y="3.5" width="12" height="11" rx="1"/><path d="M2 6.5h12M5 2v3M11 2v3"/></svg>
                </button>
                <div class="krds-calendar-area" id="calArea"></div>
            </div>
            <button type="button" class="date-clear-btn-row" onclick="onCalendarClear()" title="기간 지우기">지우기</button>
        </div>
    </div>

    <!-- Table -->
    <div class="panel">
      <div class="table-scroll">
        <table class="ltable" id="logsTable">
            <thead>
                <tr>
                    <th class="sortable" data-sort-key="id" onclick="onHeaderSort(this)">
                        # <span class="sort-arrow">▲</span>
                    </th>
                    <th class="sortable" data-sort-key="transferStatus" onclick="onHeaderSort(this)">
                        상태 <span class="sort-arrow">▲</span>
                    </th>
                    <th>서버</th>
                    <th class="sortable" data-sort-key="filename" onclick="onHeaderSort(this)">
                        파일명 <span class="sort-arrow">▲</span>
                    </th>
                    <th class="col-hide-sm">원격 경로</th>
                    <th class="sortable" data-sort-key="fileSize" onclick="onHeaderSort(this)">
                        크기 <span class="sort-arrow">▲</span>
                    </th>
                    <th class="sortable sort-active" data-sort-key="startedAt" onclick="onHeaderSort(this)">
                        시작 <span class="sort-arrow">▼</span>
                    </th>
                    <th>소요시간</th>
                    <th>에러</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <tr><td colspan="9" class="loading-state">불러오는 중...</td></tr>
            </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination-bar" id="paginationBar">
        <div class="pg-info" id="pgInfo">-</div>
        <div class="pg-list" id="pgList"></div>
    </div>
</div>

<!-- Error popover (단일 인스턴스, body 직속 — table overflow 영향 없음) -->
<div id="errPopover" class="err-pop" role="dialog" aria-modal="false" aria-labelledby="errPopTtl">
    <div class="err-pop-hdr">
        <span class="err-pop-ttl" id="errPopTtl">에러 메시지</span>
        <div class="err-pop-act">
            <button type="button" class="err-pop-btn" onclick="copyErrorPopover()">복사</button>
            <button type="button" class="err-pop-btn" onclick="hideErrorPopover()">닫기</button>
        </div>
    </div>
    <div class="err-pop-body" id="errPopBody"></div>
</div>

<!-- Export 확인 모달 (common.css .modal-ov/.modal-box 재사용) -->
<div class="modal-ov" id="exportModal" onclick="if(event.target===this)closeExportModal()">
    <div class="modal-box" role="dialog" aria-modal="true" style="max-width:420px">
        <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:10px" id="exportModalTtl">내보내기</div>
        <div style="font-size:13px;color:#6B7280;line-height:1.6;margin-bottom:18px">
            현재 검색·필터 조건의 전송 로그를 <strong id="exportFmtName">CSV</strong> 파일로 다운로드합니다.
            <span style="display:block;margin-top:4px;color:#9CA3AF;font-size:12px">최대 50,000행까지 내보냅니다.</span>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
            <button type="button" class="mbtn-cancel" onclick="closeExportModal()">취소</button>
            <button type="button" class="mbtn-confirm" id="exportConfirmBtn" onclick="confirmExport()">다운로드</button>
        </div>
    </div>
</div>

<script>
// ── State ─────────────────────────────────────────────
var _params = {
    page: 0,
    size: 20,
    sort: 'startedAt,desc',
    q: '',
    status: '',
    serverId: '',
    dateFrom: '',     // yyyy-MM-dd (포함)
    dateTo: ''        // yyyy-MM-dd (포함, 백엔드에서 +1day exclusive)
};
var _searchDebounce = null;
var _loading = false;

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    // 페이지 사이즈 복원
    var saved = parseInt(localStorage.getItem('logsPageSize') || '20', 10);
    if ([20, 30, 50, 100].indexOf(saved) !== -1) {
        _params.size = saved;
        document.getElementById('pageSizeSel').value = String(saved);
    }
    // export 외부 클릭 닫기
    document.addEventListener('click', function(e) {
        var wrap = document.getElementById('exportWrap');
        if (wrap && !wrap.contains(e.target)) {
            document.getElementById('exportMenu').classList.remove('open');
        }
    });
    // 캘린더 위젯 부착 — onChange 에서 dateFrom/dateTo 파라미터 갱신 후 재조회
    Calendar.attach({
        startInputId: 'dateStart', endInputId: 'dateEnd',
        areaId: 'calArea',
        storageKey: 'logs',
        onChange: function(start, end) {
            _params.dateFrom = start ? toIsoDate(start) : '';
            _params.dateTo = end ? toIsoDate(end) : '';
            _params.page = 0;
            loadData();
        }
    });
    // localStorage 에서 복원된 초기값을 _params 에도 반영
    var initRange = Calendar.getRange();
    if (initRange.start) _params.dateFrom = toIsoDate(initRange.start);
    if (initRange.end) _params.dateTo = toIsoDate(initRange.end);
    // 창 폭 변경 시 truncate 클래스 재계산 (debounce 150ms)
    var _resizeT = null;
    window.addEventListener('resize', function() {
        clearTimeout(_resizeT);
        _resizeT = setTimeout(markTruncated, 150);
    });
    loadData();
});

// ── 캘린더 헬퍼 ───────────────────────────────────────
function toIsoDate(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function onCalendarClear() {
    Calendar.clear();   // onChange 콜백이 호출되며 _params + loadData 갱신
}

// ── Data fetch ────────────────────────────────────────
function buildQuery(extra) {
    var p = Object.assign({}, _params, extra || {});
    var qs = [];
    Object.keys(p).forEach(function(k) {
        if (p[k] !== '' && p[k] !== null && p[k] !== undefined) {
            qs.push(encodeURIComponent(k) + '=' + encodeURIComponent(p[k]));
        }
    });
    return qs.join('&');
}

function loadData() {
    if (_loading) return;
    _loading = true;
    var listQuery = buildQuery();
    var statsQuery = buildQuery({ page: undefined, size: undefined, sort: undefined, status: undefined });

    Promise.all([
        Common.fetchJSON('/api/servers/transfers?' + listQuery),
        Common.fetchJSON('/api/servers/transfers/stats?' + statsQuery)
    ]).then(function(arr) {
        var page = arr[0], stats = arr[1];
        renderKpi(stats);
        renderTable(page.content);
        renderPagination(page.totalElements, page.totalPages, page.number, page.size);
        _loading = false;
    }).catch(function(e) {
        _loading = false;
        var tbody = document.getElementById('logsTableBody');
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">불러오기 실패: '
            + escapeHtml(e.message) + '</td></tr>';
        document.getElementById('paginationBar').classList.remove('show');
    });
}

// ── KPI ───────────────────────────────────────────────
function renderKpi(stats) {
    document.getElementById('kpiTotal').textContent = formatNum(stats.total || 0);
    document.getElementById('kpiSuccess').textContent = formatNum(stats.success || 0);
    document.getElementById('kpiFailed').textContent = formatNum(stats.failed || 0);
}

function formatNum(n) {
    return Number(n).toLocaleString('ko-KR');
}

// ── Table ─────────────────────────────────────────────
function renderTable(items) {
    var tbody = document.getElementById('logsTableBody');
    tbody.innerHTML = '';
    if (!items || items.length === 0) {
        var msg = (_params.q || _params.status || _params.serverId)
            ? '검색 조건에 맞는 결과가 없습니다.'
            : '전송 이력이 없습니다.';
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">' + msg + '</td></tr>';
        return;
    }
    items.forEach(function(t) {
        var tr = document.createElement('tr');
        tr.innerHTML = renderRow(t);
        tbody.appendChild(tr);
    });
    markTruncated();
}

// 렌더 또는 폭 변경 시 실제 truncate 여부 검사하여 .is-truncated 토글
function markTruncated() {
    document.querySelectorAll('#logsTableBody .td-path').forEach(function(el) {
        if (el.scrollWidth > el.clientWidth + 1) el.classList.add('is-truncated');
        else el.classList.remove('is-truncated');
    });
}

function renderRow(t) {
    var badge = '';
    if (t.transferStatus === 'SUCCESS') badge = '<span class="badge badge-success">SUCCESS</span>';
    else if (t.transferStatus === 'FAILED') badge = '<span class="badge badge-failed">FAILED</span>';
    else if (t.transferStatus === 'IN_PROGRESS') badge = '<span class="badge badge-progress">RUNNING</span>';
    else badge = '<span class="badge">' + escapeHtml(t.transferStatus || '-') + '</span>';

    var serverLink = t.serverName
        ? '<a href="/servers/' + t.serverId + '" class="td-server">' + escapeHtml(t.serverName) + '</a>'
        : '<span class="td-server">-</span>';

    var pathHtml = t.remotePath
        ? '<span class="td-path" title="' + escapeAttr(t.remotePath) + '">' + escapeHtml(t.remotePath) + '</span>'
        : '<span style="color:#9CA3AF">-</span>';

    var errHtml = t.errorMessage
        ? '<button type="button" class="err-btn" onclick="showErrorPopover(this)" '
            + 'data-err="' + escapeAttr(t.errorMessage) + '" '
            + 'aria-label="에러 상세 보기">에러 보기</button>'
        : '<span class="err-dash">-</span>';

    return ''
        + '<td class="td-num">' + (t.id != null ? t.id : '-') + '</td>'
        + '<td>' + badge + '</td>'
        + '<td>' + serverLink + '</td>'
        + '<td><span class="td-name" title="' + escapeAttr(t.filename || '') + '">' + escapeHtml(t.filename || '-') + '</span></td>'
        + '<td class="col-hide-sm">' + pathHtml + '</td>'
        + '<td class="td-mono">' + escapeHtml(t.formattedSize || '-') + '</td>'
        + '<td class="td-mono">' + escapeHtml(t.startedAt || '-') + '</td>'
        + '<td class="td-mono">' + escapeHtml(t.formattedDuration || '-') + '</td>'
        + '<td>' + errHtml + '</td>';
}

// ── Pagination ────────────────────────────────────────
function renderPagination(total, totalPages, currentPage, pageSize) {
    var bar = document.getElementById('paginationBar');
    if (total <= pageSize) {
        bar.classList.remove('show');
        return;
    }
    bar.classList.add('show');
    var start = currentPage * pageSize + 1;
    var end = Math.min(start + pageSize - 1, total);
    document.getElementById('pgInfo').innerHTML =
        '<strong>' + start + '–' + end + '</strong> / 전체 <strong>' + formatNum(total) + '</strong>건';

    var list = document.getElementById('pgList');
    list.innerHTML = '';
    var addBtn = function(label, page, opts) {
        opts = opts || {};
        var b = document.createElement('button');
        b.className = 'pg-btn' + (opts.active ? ' active' : '');
        b.textContent = label;
        if (opts.disabled) b.disabled = true;
        else b.onclick = function() { gotoPage(page); };
        list.appendChild(b);
    };
    var addEllipsis = function() {
        var s = document.createElement('span');
        s.className = 'pg-ellipsis'; s.textContent = '…';
        list.appendChild(s);
    };

    addBtn('‹', currentPage - 1, { disabled: currentPage === 0 });

    var pages = new Set([0, totalPages - 1, currentPage]);
    for (var d = 1; d <= 2; d++) {
        if (currentPage - d >= 0) pages.add(currentPage - d);
        if (currentPage + d <= totalPages - 1) pages.add(currentPage + d);
    }
    var sorted = Array.from(pages).sort(function(a, b) { return a - b; });
    var prev = -1;
    sorted.forEach(function(p) {
        if (p - prev > 1) addEllipsis();
        addBtn(String(p + 1), p, { active: p === currentPage });
        prev = p;
    });

    addBtn('›', currentPage + 1, { disabled: currentPage === totalPages - 1 });
}

// ── Event handlers ────────────────────────────────────
function onSearchInput() {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(function() {
        _params.q = document.getElementById('searchInput').value.trim();
        _params.page = 0;
        loadData();
    }, 300);
}

function onStatusChange() {
    _params.status = document.getElementById('statusSel').value;
    _params.page = 0;
    loadData();
}

function onServerChange() {
    _params.serverId = document.getElementById('serverSel').value;
    _params.page = 0;
    loadData();
}

function onPageSizeChange() {
    _params.size = parseInt(document.getElementById('pageSizeSel').value, 10) || 20;
    _params.page = 0;
    localStorage.setItem('logsPageSize', String(_params.size));
    loadData();
}

function onHeaderSort(th) {
    var key = th.getAttribute('data-sort-key');
    var current = _params.sort.split(',');
    var newSort;
    if (current[0] === key) {
        newSort = key + ',' + (current[1] === 'asc' ? 'desc' : 'asc');
    } else {
        newSort = key + ',asc';
    }
    _params.sort = newSort;
    updateSortIndicators();
    loadData();
}

function updateSortIndicators() {
    var parts = _params.sort.split(',');
    var activeKey = parts[0], activeDir = parts[1];
    document.querySelectorAll('#logsTable th.sortable').forEach(function(th) {
        var arrow = th.querySelector('.sort-arrow');
        if (!arrow) return;
        if (th.getAttribute('data-sort-key') === activeKey) {
            th.classList.add('sort-active');
            arrow.textContent = (activeDir === 'asc') ? '▲' : '▼';
        } else {
            th.classList.remove('sort-active');
            arrow.textContent = '▲';
        }
    });
}

function gotoPage(p) {
    _params.page = p;
    loadData();
}

// ── Export ────────────────────────────────────────────
function toggleExportMenu(e) {
    e.stopPropagation();
    document.getElementById('exportMenu').classList.toggle('open');
}

var _exportFormat = null;

// Export 메뉴 클릭 → 즉시 다운로드 대신 확인 모달 표시
function exportData(format) {
    document.getElementById('exportMenu').classList.remove('open');
    _exportFormat = format;
    document.getElementById('exportFmtName').textContent = format.toUpperCase();
    document.getElementById('exportModalTtl').textContent = format.toUpperCase() + ' 내보내기';
    var btn = document.getElementById('exportConfirmBtn');
    btn.disabled = false;
    btn.textContent = '다운로드';
    document.getElementById('exportModal').classList.add('open');
}

function closeExportModal() {
    document.getElementById('exportModal').classList.remove('open');
}

// blob 다운로드 — 페이지 네비게이션(=브라우저 탭 무한 스피너) 없이 저장.
function confirmExport() {
    if (!_exportFormat) return;
    var format = _exportFormat;
    var btn = document.getElementById('exportConfirmBtn');
    btn.disabled = true;
    btn.textContent = '다운로드 중…';
    var qs = buildQuery({ page: undefined, size: undefined, format: format });
    var url = '/api/servers/transfers/export?' + qs;
    fetch(url, { credentials: 'same-origin' })
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            var cd = r.headers.get('Content-Disposition') || '';
            var m = /filename\*?=(?:UTF-8'')?["']?([^"';]+)/i.exec(cd);
            var fname = m ? decodeURIComponent(m[1]) : ('transfer-logs.' + format);
            return r.blob().then(function(blob) { return { blob: blob, fname: fname }; });
        })
        .then(function(res) {
            var objUrl = URL.createObjectURL(res.blob);
            var a = document.createElement('a');
            a.href = objUrl;
            a.download = res.fname;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(objUrl); }, 1000);
            closeExportModal();
        })
        .catch(function(e) {
            alert('내보내기 실패: ' + (e && e.message ? e.message : e));
            btn.disabled = false;
            btn.textContent = '다운로드';
        });
}

// ── Helpers ───────────────────────────────────────────
// escapeHtml → Common.escHtml (common.js). 동일 5 문자 escape 라 동작 100% 일치.
var escapeHtml = Common.escHtml;
function escapeAttr(s) { return escapeHtml(s); }

// ── Error popover ─────────────────────────────────────
var _errPopAnchor = null;

function showErrorPopover(btn) {
    var pop = document.getElementById('errPopover');
    var body = document.getElementById('errPopBody');
    var msg = btn.getAttribute('data-err') || '';
    body.textContent = msg;          // textContent — XSS 방어 (이미 escape 된 attr 이지만 이중 안전)
    _errPopAnchor = btn;

    // 위치 계산: 버튼 아래 우선, 화면 아래 부족하면 위로
    pop.style.visibility = 'hidden';
    pop.classList.add('show');
    var btnRect = btn.getBoundingClientRect();
    var popRect = pop.getBoundingClientRect();
    var sx = window.pageXOffset || document.documentElement.scrollLeft;
    var sy = window.pageYOffset || document.documentElement.scrollTop;
    var gap = 6;

    var top = btnRect.bottom + sy + gap;
    if (btnRect.bottom + popRect.height + gap > window.innerHeight && btnRect.top - popRect.height - gap > 0) {
        top = btnRect.top + sy - popRect.height - gap;  // 위로 펼침
    }
    var left = btnRect.left + sx;
    var maxLeft = window.innerWidth + sx - popRect.width - 8;
    if (left > maxLeft) left = maxLeft;
    if (left < sx + 8) left = sx + 8;

    pop.style.top = top + 'px';
    pop.style.left = left + 'px';
    pop.style.visibility = '';
}

function hideErrorPopover() {
    var pop = document.getElementById('errPopover');
    pop.classList.remove('show');
    _errPopAnchor = null;
}

function copyErrorPopover() {
    var body = document.getElementById('errPopBody');
    var text = body.textContent || '';
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function(){ flashCopied(); }, function(){ fallbackCopy(text); });
    } else {
        fallbackCopy(text);
    }
}
function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); flashCopied(); } catch(_) {}
    document.body.removeChild(ta);
}
function flashCopied() {
    var btns = document.querySelectorAll('#errPopover .err-pop-btn');
    if (btns.length === 0) return;
    var b = btns[0];
    var orig = b.textContent;
    b.textContent = '복사됨';
    setTimeout(function(){ b.textContent = orig; }, 1200);
}

// 외부 클릭 / Esc / 리사이즈·스크롤 시 닫기
document.addEventListener('click', function(e) {
    var pop = document.getElementById('errPopover');
    if (!pop.classList.contains('show')) return;
    if (pop.contains(e.target)) return;                 // 팝오버 내부 클릭은 무시
    if (_errPopAnchor && _errPopAnchor.contains(e.target)) return; // 트리거 버튼 자체 클릭은 토글로 처리
    hideErrorPopover();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideErrorPopover();
});
window.addEventListener('resize', hideErrorPopover);
window.addEventListener('scroll', hideErrorPopover, true);
</script>

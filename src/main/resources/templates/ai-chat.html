<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>AI Chat — Heap Dump Analyzer</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: 'Segoe UI', 'Trebuchet MS', sans-serif; font-size: 14px;
               color: #1F2937; background: #F3F4F6; line-height: 1.5; overflow: hidden; }

        /* ── Topbar ─────────────────────────────────── */
        .topbar { position: fixed; top: 0; left: var(--banner-w, 220px); right: 0; z-index: 100; height: 52px;
                  transition: left .25s cubic-bezier(.4,0,.2,1);
                  background: #fff; border-bottom: 1px solid #E5E7EB;
                  display: flex; align-items: center; justify-content: space-between;
                  padding: 0 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .topbar-brand { display: flex; align-items: center; gap: 10px; }
        .topbar-title { font-size: 16px; font-weight: 700; }
        .topbar-right { display: flex; align-items: center; gap: 6px; }
        .topbar-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #E5E7EB;
                      border-radius: 6px; background: transparent; color: #6B7280;
                      cursor: pointer; text-decoration: none; }
        .topbar-btn:hover { background: #F9FAFB; }

        /* ── Main layout ────────────────────────────── */
        .chat-layout {
            position: fixed; top: 52px; left: var(--banner-w, 220px); right: 0; bottom: 0;
            display: flex; transition: left .25s cubic-bezier(.4,0,.2,1);
        }

        /* ── Session sidebar ────────────────────────── */
        .session-sidebar {
            width: 280px; background: #fff; border-right: 1px solid #E5E7EB;
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .session-header {
            padding: 14px 16px; border-bottom: 1px solid #E5E7EB;
            display: flex; align-items: center; justify-content: space-between;
        }
        .session-header-title { font-size: 13px; font-weight: 700; color: #374151; }
        .session-new-btn {
            padding: 5px 12px; border: 1px solid #D1D5DB; border-radius: 6px;
            background: #fff; font-size: 11px; cursor: pointer; color: #374151; font-weight: 600;
        }
        .session-new-btn:hover { background: #F3F4F6; }
        .session-filter {
            padding: 8px 16px; border-bottom: 1px solid #F3F4F6;
        }
        .session-filter select {
            width: 100%; padding: 5px 8px; border: 1px solid #D1D5DB; border-radius: 6px;
            font-size: 12px; background: #fff;
        }
        .session-list { flex: 1; overflow-y: auto; padding: 4px 0; }
        .session-item {
            padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #F9FAFB;
            transition: background .15s;
        }
        .session-item:hover { background: #F9FAFB; }
        .session-item.active { background: #EFF6FF; border-left: 3px solid #3B82F6; }
        .session-item-title { font-size: 13px; font-weight: 600; color: #1F2937;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-item-meta { font-size: 11px; color: #9CA3AF; margin-top: 2px; display: flex; gap: 8px; }
        .session-item-file { font-size: 10px; color: #6B7280; background: #F3F4F6;
            padding: 1px 6px; border-radius: 4px; margin-top: 3px; display: inline-block;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-item-actions { display: none; float: right; }
        .session-item:hover .session-item-actions { display: inline-flex; gap: 4px; }
        .session-del-btn { background: none; border: none; cursor: pointer; color: #9CA3AF; font-size: 14px; padding: 0 2px; }
        .session-del-btn:hover { color: #DC2626; }
        .session-empty { padding: 40px 16px; text-align: center; color: #9CA3AF; font-size: 13px; }

        /* ── Chat area ──────────────────────────────── */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #FAFBFC; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 12px;
            max-width: 800px; width: 100%; margin: 0 auto;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
        .chat-input-area {
            padding: 16px 24px; border-top: 1px solid #E5E7EB; background: #fff;
            display: flex; gap: 10px; align-items: flex-end;
            max-width: 800px; width: 100%; margin: 0 auto; box-sizing: border-box;
        }
        .chat-textarea {
            flex: 1; resize: none; border: 1px solid #D1D5DB; border-radius: 12px;
            padding: 12px 16px; font-size: 14px; line-height: 1.5; max-height: 120px;
            overflow-y: auto; font-family: 'Segoe UI', sans-serif; outline: none;
            transition: border-color .2s;
        }
        .chat-textarea:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
        .chat-send-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
            background: linear-gradient(135deg, #3B82F6, #6366F1); color: #fff;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }
        .chat-send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }

        /* ── Message bubbles ────────────────────────── */
        .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.65; word-break: break-word; }
        .chat-msg-user { align-self: flex-end; background: linear-gradient(135deg, #3B82F6, #4F46E5); color: #fff; border-bottom-right-radius: 4px; }
        .chat-msg-assistant { align-self: flex-start; background: #fff; color: #1F2937; border: 1px solid #E5E7EB; border-bottom-left-radius: 4px; }
        .chat-msg-assistant strong { font-weight: 700; }
        .chat-msg-assistant code { background: #F3F4F6; padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
        .chat-msg-assistant pre { background: #1F2937; color: #E5E7EB; padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 12px; line-height: 1.5; }
        .chat-msg-assistant pre code { background: none; padding: 0; color: inherit; }
        .chat-msg-time { font-size: 10px; color: #9CA3AF; margin-top: 4px; }
        .chat-msg-user .chat-msg-time { color: rgba(255,255,255,.6); text-align: right; }

        /* ── Date separator ─────────────────────────── */
        .chat-date-sep { align-self: center; display: flex; align-items: center; gap: 12px;
                         width: 100%; margin: 8px 0; }
        .chat-date-sep::before, .chat-date-sep::after { content: ''; flex: 1; height: 1px; background: #E5E7EB; }
        .chat-date-label { font-size: 11px; color: #9CA3AF; font-weight: 600; white-space: nowrap; }
        .chat-msg-welcome { align-self: center; background: #EFF6FF; color: #1E40AF; font-size: 12px; padding: 12px 16px; border-radius: 10px; text-align: center; line-height: 1.7; border: 1px solid #BFDBFE; }
        .chat-msg-error { align-self: center; background: #FEF2F2; color: #991B1B; font-size: 12px; padding: 8px 14px; border-radius: 8px; text-align: center; border: 1px solid #FECACA; }
        .chat-cursor { color: #3B82F6; animation: cursorBlink .8s infinite; }
        @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

        .chat-typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 16px; background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; border-bottom-left-radius: 4px; }
        .chat-typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #9CA3AF; animation: chatDot 1.2s infinite ease-in-out; }
        .chat-typing-dot:nth-child(2) { animation-delay: .2s; }
        .chat-typing-dot:nth-child(3) { animation-delay: .4s; }
        @keyframes chatDot { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }

        /* ── Empty state ────────────────────────────── */
        .chat-empty-state {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 12px; color: #9CA3AF;
        }
        .chat-empty-state svg { width: 48px; height: 48px; stroke: #D1D5DB; fill: none; stroke-width: 1.5; }

        /* ── Responsive ─────────────────────────────── */
        @media (min-width: 1024px) { .topbar-title { font-size: 18px; } }
        @media (max-width: 900px) {
            .topbar { left: 0; }
            .chat-layout { left: 0; }
            .session-sidebar { width: 220px; }
        }
        @media (max-width: 640px) {
            .session-sidebar { display: none; }
            .chat-area { width: 100%; }
        }
    </style>
</head>
<body>

<div th:replace="fragments/banner :: banner"></div>

<div class="topbar">
    <div class="topbar-brand">
        <button class="gb-menu-btn" id="menuBtn" onclick="toggleMobileBanner()" aria-label="Menu"><span></span><span></span><span></span></button>
        <span class="topbar-title">AI Chat</span>
    </div>
    <div class="topbar-right">
        <a href="/" class="topbar-btn">&larr; Dashboard</a>
    </div>
</div>

<div class="chat-layout">
    <!-- 세션 사이드바 -->
    <div class="session-sidebar">
        <div class="session-header">
            <span class="session-header-title">채팅 목록</span>
            <button class="session-new-btn" onclick="createNewSession()">+ 새 채팅</button>
        </div>
        <div class="session-filter">
            <select id="sessionFilter" onchange="loadSessions()">
                <option value="">전체</option>
            </select>
        </div>
        <div class="session-list" id="sessionList">
            <div class="session-empty">채팅 이력이 없습니다.</div>
        </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-area" id="chatArea">
        <div class="chat-empty-state" id="chatEmptyState">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div style="font-size:16px;font-weight:600;color:#6B7280">AI Chat</div>
            <div style="font-size:13px">좌측에서 채팅을 선택하거나 새 채팅을 시작하세요.</div>
        </div>
        <div class="chat-messages" id="chatMessages" style="display:none"></div>
        <div class="chat-input-area" id="chatInputArea" style="display:none">
            <textarea class="chat-textarea" id="chatInput" rows="1" placeholder="질문을 입력하세요..."
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
var _sessions = [];
var _activeSessionId = null;
var _messages = [];
var _sending = false;
var _model = '';

// ── 초기화 ─────────────────────────────────────────────

function init() {
    loadFilenameFilter();
    loadSessions();
}

function loadFilenameFilter() {
    fetch('/api/ai-chat/sessions').then(function(r){ return r.json(); }).then(function(sessions) {
        var filenames = [];
        sessions.forEach(function(s) {
            if (s.filename && filenames.indexOf(s.filename) === -1) filenames.push(s.filename);
        });
        var sel = document.getElementById('sessionFilter');
        filenames.forEach(function(f) {
            var opt = document.createElement('option');
            opt.value = f;
            opt.textContent = f.length > 30 ? f.substring(0, 30) + '...' : f;
            sel.appendChild(opt);
        });
    }).catch(function(){});
}

function loadSessions() {
    var filter = document.getElementById('sessionFilter').value;
    var url = '/api/ai-chat/sessions' + (filter ? '?filename=' + encodeURIComponent(filter) : '');
    fetch(url).then(function(r){ return r.json(); }).then(function(sessions) {
        _sessions = sessions;
        renderSessionList();
    }).catch(function(){});
}

function renderSessionList() {
    var list = document.getElementById('sessionList');
    if (!_sessions.length) {
        list.innerHTML = '<div class="session-empty">채팅 이력이 없습니다.</div>';
        return;
    }
    var html = '';
    _sessions.forEach(function(s) {
        var active = s.id === _activeSessionId ? ' active' : '';
        var date = s.updatedAt ? s.updatedAt.substring(0, 16).replace('T', ' ') : '';
        html += '<div class="session-item' + active + '" onclick="selectSession(' + s.id + ')">'
            + '<div class="session-item-actions">'
            + '<button class="session-del-btn" onclick="event.stopPropagation();deleteSession(' + s.id + ')" title="삭제">&times;</button>'
            + '</div>'
            + '<div class="session-item-title">' + escHtml(s.title || '새 채팅') + '</div>'
            + '<div class="session-item-meta"><span>' + date + '</span><span>' + (s.messageCount || 0) + '개 메시지</span></div>'
            + (s.filename ? '<div class="session-item-file">' + escHtml(s.filename) + '</div>' : '')
            + '</div>';
    });
    list.innerHTML = html;
}

// ── 세션 관리 ──────────────────────────────────────────

function createNewSession() {
    var filter = document.getElementById('sessionFilter').value;
    fetch('/api/ai-chat/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: filter || '', title: '새 채팅' })
    })
    .then(checkAuth)
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success) {
            selectSession(d.sessionId);
            loadSessions();
        }
    })
    .catch(function(e) { alert(e.message); });
}

function selectSession(id) {
    _activeSessionId = id;
    document.getElementById('chatEmptyState').style.display = 'none';
    document.getElementById('chatMessages').style.display = '';
    document.getElementById('chatInputArea').style.display = '';
    renderSessionList();
    loadMessages(id);
}

function deleteSession(id) {
    if (!confirm('이 채팅을 삭제하시겠습니까?')) return;
    fetch('/api/ai-chat/sessions/' + id, { method: 'DELETE' })
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success) {
            if (_activeSessionId === id) {
                _activeSessionId = null;
                _messages = [];
                document.getElementById('chatMessages').innerHTML = '';
                document.getElementById('chatMessages').style.display = 'none';
                document.getElementById('chatInputArea').style.display = 'none';
                document.getElementById('chatEmptyState').style.display = '';
            }
            loadSessions();
        }
    });
}

// ── 메시지 ─────────────────────────────────────────────

function loadMessages(sessionId) {
    fetch('/api/ai-chat/sessions/' + sessionId + '/messages')
    .then(function(r){ return r.json(); })
    .then(function(messages) {
        _messages = messages.map(function(m) { return { role: m.role, content: m.content }; });
        var container = document.getElementById('chatMessages');
        container.innerHTML = '';
        if (!messages.length) {
            var div = document.createElement('div');
            div.className = 'chat-msg chat-msg-welcome';
            div.innerHTML = '<strong>AI Chat</strong><br>질문을 입력하여 대화를 시작하세요.';
            container.appendChild(div);
        } else {
            var lastDate = '';
            messages.forEach(function(m) {
                var dateStr = extractDate(m.createdAt);
                if (dateStr && dateStr !== lastDate) {
                    appendDateSep(dateStr);
                    lastDate = dateStr;
                }
                appendMsg(m.role, m.content, m.createdAt);
            });
        }
        container.scrollTop = container.scrollHeight;
    });
}

function appendMsg(role, content, createdAt) {
    var container = document.getElementById('chatMessages');
    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-direction:column;' + (role === 'user' ? 'align-items:flex-end' : 'align-items:flex-start');
    var div = document.createElement('div');
    div.className = 'chat-msg chat-msg-' + role;
    if (role === 'assistant') {
        div.innerHTML = mdRender(content);
    } else {
        div.textContent = content;
    }
    wrapper.appendChild(div);
    var timeStr = extractTime(createdAt);
    if (timeStr) {
        var timeDiv = document.createElement('div');
        timeDiv.className = 'chat-msg-time';
        timeDiv.textContent = timeStr;
        wrapper.appendChild(timeDiv);
    }
    container.appendChild(wrapper);
}

function appendDateSep(dateStr) {
    var container = document.getElementById('chatMessages');
    var sep = document.createElement('div');
    sep.className = 'chat-date-sep';
    sep.innerHTML = '<span class="chat-date-label">' + escHtml(dateStr) + '</span>';
    container.appendChild(sep);
}

function extractDate(dt) {
    if (!dt) return '';
    var d = new Date(dt);
    if (isNaN(d.getTime())) return '';
    var now = new Date();
    var y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
    if (y === now.getFullYear() && m === now.getMonth() && day === now.getDate()) return '오늘';
    var yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    if (y === yesterday.getFullYear() && m === yesterday.getMonth() && day === yesterday.getDate()) return '어제';
    return y + '년 ' + (m + 1) + '월 ' + day + '일';
}

function extractTime(dt) {
    if (!dt) return '';
    var d = new Date(dt);
    if (isNaN(d.getTime())) return '';
    var h = d.getHours(), mi = d.getMinutes();
    var ampm = h < 12 ? '오전' : '오후';
    var h12 = h % 12 || 12;
    return ampm + ' ' + h12 + ':' + (mi < 10 ? '0' : '') + mi;
}

function sendMessage() {
    if (_sending || !_activeSessionId) return;
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;

    var now = new Date().toISOString();
    var todayDate = extractDate(now);
    var dateSeps = document.getElementById('chatMessages').querySelectorAll('.chat-date-label');
    var lastDateText = dateSeps.length ? dateSeps[dateSeps.length - 1].textContent : '';
    if (todayDate && todayDate !== lastDateText) appendDateSep(todayDate);
    _messages.push({ role: 'user', content: text });
    appendMsg('user', text, now);
    input.value = '';
    input.style.height = 'auto';

    _sending = true;
    document.getElementById('chatSendBtn').disabled = true;

    // typing
    var container = document.getElementById('chatMessages');
    var typing = document.createElement('div');
    typing.className = 'chat-typing';
    typing.innerHTML = '<div class="chat-typing-dot"></div><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div>';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;

    // 스트리밍 버블 준비
    var bubbleWrapper = document.createElement('div');
    bubbleWrapper.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start';
    var bubble = document.createElement('div');
    bubble.className = 'chat-msg chat-msg-assistant';
    bubble.innerHTML = '<span style="color:#9CA3AF">&#9612;</span>';
    bubbleWrapper.appendChild(bubble);

    var fullText = '';

    fetch('/api/ai-chat/sessions/' + _activeSessionId + '/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: _messages, context: '', filename: '' })
    })
    .then(function(response) {
        checkAuth(response);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        if (typing.parentNode) typing.parentNode.removeChild(typing);
        container.appendChild(bubbleWrapper);

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var currentEvent = '';

        function process() {
            return reader.read().then(function(result) {
                if (result.done) {
                    if (buffer.trim()) parseBuf(buffer);
                    finish();
                    return;
                }
                buffer += decoder.decode(result.value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                lines.forEach(function(line) {
                    if (line.indexOf('event:') === 0) currentEvent = line.substring(6).trim();
                    else if (line.indexOf('data:') === 0) {
                        try {
                            var d = JSON.parse(line.substring(5).trim());
                            if (currentEvent === 'start' && d.model) _model = d.model;
                            else if (currentEvent === 'chunk' && d.text) {
                                fullText += d.text;
                                bubble.innerHTML = mdRender(fullText) + '<span class="chat-cursor">&#9612;</span>';
                                container.scrollTop = container.scrollHeight;
                            } else if (currentEvent === 'error') {
                                var err = document.createElement('div');
                                err.className = 'chat-msg chat-msg-error';
                                err.textContent = (d.errorCode ? '[' + d.errorCode + '] ' : '') + (d.error || 'Error');
                                container.appendChild(err);
                                _messages.pop();
                            }
                        } catch(e){}
                        currentEvent = '';
                    }
                });
                return process();
            });
        }

        function parseBuf(b) { b.split('\n').forEach(function(l) { /* handled inline */ }); }

        function finish() {
            if (fullText) {
                bubble.innerHTML = mdRender(fullText);
                _messages.push({ role: 'assistant', content: fullText });
                var timeDiv = document.createElement('div');
                timeDiv.className = 'chat-msg-time';
                timeDiv.textContent = extractTime(new Date().toISOString());
                bubbleWrapper.appendChild(timeDiv);
            } else if (bubbleWrapper.parentNode) {
                bubbleWrapper.parentNode.removeChild(bubbleWrapper);
            }
            _sending = false;
            document.getElementById('chatSendBtn').disabled = false;
            document.getElementById('chatInput').focus();
            loadSessions(); // 세션 목록 갱신 (제목/시간)
        }

        return process();
    })
    .catch(function(e) {
        if (typing.parentNode) typing.parentNode.removeChild(typing);
        var err = document.createElement('div');
        err.className = 'chat-msg chat-msg-error';
        err.textContent = '네트워크 오류: ' + e.message;
        container.appendChild(err);
        _messages.pop();
        _sending = false;
        document.getElementById('chatSendBtn').disabled = false;
    });
}

// ── 인증 체크 ─────────────────────────────────────────

function checkAuth(r) {
    if (r.redirected || r.status === 401 || r.status === 403 || r.status === 302) {
        throw new Error('로그인이 만료되었습니다. 페이지를 새로고침 해주세요.');
    }
    var ct = r.headers.get('content-type') || '';
    if (!ct.includes('application/json') && !ct.includes('text/event-stream')) {
        throw new Error('로그인이 만료되었습니다. 페이지를 새로고침 해주세요.');
    }
    return r;
}

// ── 유틸 ───────────────────────────────────────────────

function escHtml(t) {
    return t ? t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
}

function mdRender(text) {
    if (!text) return '';
    var s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m,lang,code) {
        return '<pre><code>' + code.trim() + '</code></pre>';
    });
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\n/g, '<br>');
    s = s.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, function(m,c) {
        return '<pre><code>' + c.replace(/<br>/g, '\n') + '</code></pre>';
    });
    return s;
}

// textarea auto-resize
document.addEventListener('DOMContentLoaded', function() {
    var ta = document.getElementById('chatInput');
    if (ta) ta.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    init();
});
</script>

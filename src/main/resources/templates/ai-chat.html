<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/common.css?v=2026-06-05">
    <title>AI Chat — Heap Dump Analyzer</title>
    <style>
        body { overflow: hidden; }  /* AI Chat 페이지 전용 */

        /* ── Main layout ────────────────────────────── */
        .chat-layout {
            position: fixed; top: 52px; left: var(--banner-w, 220px); right: 0; bottom: 0;
            display: flex; transition: left .25s cubic-bezier(.4,0,.2,1);
        }

        /* ── Session sidebar ────────────────────────── */
        .session-sidebar {
            width: 320px; background: #F9FAFB; border-right: 1px solid #E5E7EB;
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .session-header {
            padding: 14px 16px; border-bottom: 1px solid #E5E7EB;
            display: flex; align-items: center; justify-content: space-between;
        }
        .session-header-title { font-size: 13px; font-weight: 700; color: #374151; }
        .session-new-btn {
            padding: 5px 12px; border: 1px solid #D1D5DB; border-radius: 6px;
            background: #fff; font-size: 11px; cursor: pointer; color: #374151; font-weight: 600;
        }
        .session-new-btn:hover { background: #F3F4F6; }
        .session-filter {
            padding: 8px 16px; border-bottom: 1px solid #F3F4F6;
        }
        .session-filter select {
            width: 100%; padding: 5px 8px; border: 1px solid #D1D5DB; border-radius: 6px;
            font-size: 12px; background: #fff;
        }
        .session-filter-search {
            width: 100%; padding: 5px 8px; border: 1px solid #D1D5DB; border-radius: 6px;
            font-size: 12px; background: #fff; box-sizing: border-box; outline: none;
        }
        .session-filter-search:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .session-list { flex: 1; overflow-y: auto; padding: 8px 10px 12px; }
        .session-item {
            position: relative; background: #FFFFFF;
            border: 1px solid #E5E7EB; border-radius: 10px;
            padding: 10px 12px; margin: 0 0 8px 0;
            box-shadow: 0 1px 2px rgba(17,24,39,.04);
            cursor: pointer;
            transition: box-shadow .15s, transform .15s, background .15s, border-color .15s;
        }
        .session-item:hover {
            box-shadow: 0 4px 10px rgba(17,24,39,.08);
            transform: translateY(-1px); border-color: #D1D5DB;
        }
        .session-item.active {
            background: #EFF6FF; border-color: #93C5FD;
            box-shadow: 0 4px 12px rgba(59,130,246,.18);
            transform: translateX(2px);
        }
        .session-item-head {
            display: flex; align-items: center; gap: 6px; min-width: 0;
        }
        .session-item-title {
            flex: 1; min-width: 0;
            font-size: 13px; font-weight: 600; color: #1F2937;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .session-item-title-input {
            display: none; flex: 1; min-width: 0;
            box-sizing: border-box; padding: 4px 6px;
            font: 600 13px inherit; color: #1F2937;
            border: 1px solid #93C5FD; border-radius: 6px;
            outline: none; background: #fff;
        }
        .session-item.is-renaming .session-item-title { display: none; }
        .session-item.is-renaming .session-item-title-input { display: block; }
        .session-item.is-renaming .session-item-actions { display: none !important; }
        .session-item-meta { font-size: 11px; color: #9CA3AF; margin-top: 6px; display: flex; gap: 6px; }
        .session-item-file { font-size: 10px; color: #6B7280; background: #F3F4F6;
            padding: 1px 6px; border-radius: 4px; margin-top: 6px; display: inline-block;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-item-analyzed { font-size: 10px; color: #9CA3AF; margin-top: 4px; }
        .session-item-state {
            display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .3px;
            padding: 1px 6px; border-radius: 3px; margin-top: 6px; margin-right: 4px;
        }
        .session-item-state.deleted  { background: #FEE2E2; color: #B91C1C; }
        .session-item-state.previous { background: #FEF3C7; color: #92400E; }
        /* 작성자 태그 (admin 화면 또는 본인 외 작성자 표시) */
        .session-item-user {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 10px;
            background: #EEF2FF; color: #4338CA; border: 1px solid #C7D2FE;
            margin-top: 0; max-width: 80px; flex-shrink: 0; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .session-item-user.is-self { background: #ECFDF5; color: #065F46; border-color: #A7F3D0; }
        .session-item-user::before {
            content: ''; width: 7px; height: 7px; border-radius: 50%;
            background: currentColor; opacity: .65; flex-shrink: 0;
        }
        /* admin 사용자 셀렉트 */
        .session-filter-row { display: flex; flex-direction: column; gap: 6px; }
        .session-item.is-deleted { background: #FAFAFA; box-shadow: none; }
        .session-item.is-deleted .session-item-title { color: #9CA3AF; text-decoration: line-through; }
        .session-item.is-deleted .session-item-file  { opacity: .65; }
        .session-item-actions { display: none; gap: 2px; align-items: center; flex-shrink: 0; }
        .session-item:hover .session-item-actions { display: inline-flex; }
        .session-edit-btn,
        .session-del-btn { background: none; border: none; cursor: pointer; color: #9CA3AF; font-size: 14px; padding: 0 2px; line-height: 1; }
        .session-edit-btn:hover { color: #2563EB; }
        .session-del-btn:hover { color: #DC2626; }
        .session-empty { padding: 40px 16px; text-align: center; color: #9CA3AF; font-size: 13px; }

        /* ── Chat area ──────────────────────────────── */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #FAFBFC; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 12px;
            max-width: 800px; width: 100%; margin: 0 auto;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
        .chat-input-area {
            padding: 16px 24px; border-top: 1px solid #E5E7EB; background: #fff;
            display: flex; gap: 10px; align-items: flex-end;
            max-width: 800px; width: 100%; margin: 0 auto; box-sizing: border-box;
        }
        .chat-textarea {
            flex: 1; resize: none; border: 1px solid #D1D5DB; border-radius: 12px;
            padding: 12px 16px; font-size: 14px; line-height: 1.5; max-height: 120px;
            overflow-y: auto; font-family: 'Segoe UI', sans-serif; outline: none;
            transition: border-color .2s;
        }
        .chat-textarea:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
        .chat-send-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
            background: linear-gradient(135deg, #3B82F6, #6366F1); color: #fff;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }
        .chat-send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }

        /* ── Message bubbles ────────────────────────── */
        .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.65; word-break: break-word; }
        .chat-msg-user { align-self: flex-end; background: linear-gradient(135deg, #3B82F6, #4F46E5); color: #fff; border-bottom-right-radius: 4px; }
        .chat-msg-assistant { align-self: flex-start; background: #fff; color: #1F2937; border: 1px solid #E5E7EB; border-bottom-left-radius: 4px; }
        .chat-msg-assistant strong { font-weight: 700; }
        .chat-msg-assistant code { background: #F3F4F6; padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
        .chat-msg-assistant pre { background: #1F2937; color: #E5E7EB; padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 12px; line-height: 1.5; }
        .chat-msg-assistant pre code { background: none; padding: 0; color: inherit; }
        .chat-msg-time { font-size: 10px; color: #9CA3AF; margin-top: 4px; }
        .chat-msg-user .chat-msg-time { color: rgba(255,255,255,.6); text-align: right; }

        /* ── Date separator ─────────────────────────── */
        .chat-date-sep { align-self: center; display: flex; align-items: center; gap: 12px;
                         width: 100%; margin: 8px 0; }
        .chat-date-sep::before, .chat-date-sep::after { content: ''; flex: 1; height: 1px; background: #E5E7EB; }
        .chat-date-label { font-size: 11px; color: #9CA3AF; font-weight: 600; white-space: nowrap; }
        .chat-msg-welcome { align-self: center; background: #EFF6FF; color: #1E40AF; font-size: 12px; padding: 12px 16px; border-radius: 10px; text-align: center; line-height: 1.7; border: 1px solid #BFDBFE; }
        .chat-msg-error { align-self: center; background: #FEF2F2; color: #991B1B; font-size: 12px; padding: 8px 14px; border-radius: 8px; text-align: center; border: 1px solid #FECACA; }
        .chat-cursor { color: #3B82F6; animation: cursorBlink .8s infinite; }
        @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

        .chat-typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 16px; background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; border-bottom-left-radius: 4px; }
        .chat-typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #9CA3AF; animation: chatDot 1.2s infinite ease-in-out; }
        .chat-typing-dot:nth-child(2) { animation-delay: .2s; }
        .chat-typing-dot:nth-child(3) { animation-delay: .4s; }
        @keyframes chatDot { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }

        /* ── Empty state ────────────────────────────── */
        .chat-empty-state {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 12px; color: #9CA3AF;
        }
        .chat-empty-state svg { width: 48px; height: 48px; stroke: #D1D5DB; fill: none; stroke-width: 1.5; }

        /* ── Mobile back-to-list 버튼 (≤640px 진입 시 표시) ──── */
        .chat-back-btn {
            display: none; align-items: center; gap: 6px;
            padding: 8px 12px; background: #fff; border-bottom: 1px solid #E5E7EB;
            font-size: 13px; color: #2563EB; font-weight: 600; cursor: pointer;
            width: 100%; text-align: left;
        }
        .chat-back-btn:hover { background: #F9FAFB; }
        .chat-back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* ── Responsive ─────────────────────────────── */
        @media (min-width: 1024px) { .topbar-title { font-size: 18px; } }
        @media (max-width: 900px) {
            .topbar { left: 0; }
            .chat-layout { left: 0; }
            .session-sidebar { width: 220px; }
        }
        @media (max-width: 640px) {
            /* 기본 진입: 사이드바(목록) 풀폭 표시, 채팅 영역 숨김 */
            .chat-layout > .session-sidebar {
                width: 100%; border-right: none;
            }
            .chat-layout > .chat-area { display: none; }
            /* 세션 선택 후: 사이드바 숨김, 채팅 영역 풀폭 */
            body.mobile-chat-active .chat-layout > .session-sidebar { display: none; }
            body.mobile-chat-active .chat-layout > .chat-area { display: flex; width: 100%; }
            /* 채팅 영역 진입 시 back 버튼 노출 */
            body.mobile-chat-active .chat-back-btn { display: flex; }
        }
        /* 배너 모바일 채팅 탭 안의 사이드바: 풀 블리드, 항상 표시 */
        #gbMobileChat .session-sidebar {
            display: flex !important;
            width: 100%; height: 100%;
            border-right: none;
        }
        #gbMobileChat { padding: 0; }
    </style>
</head>
<body>

<div th:replace="~{fragments/banner :: banner}"></div>

<div class="topbar">
    <div class="topbar-brand">
        <button class="gb-menu-btn" id="menuBtn" onclick="toggleMobileBanner()" aria-label="Menu"><span></span><span></span><span></span></button>
        <span class="topbar-title">AI Chat</span>
    </div>
    <div class="topbar-right">
        <a href="/" class="topbar-btn">&larr; Dashboard</a>
    </div>
</div>

<div class="chat-layout"
     th:attr="data-is-admin=${isAdmin}, data-current-user=${currentUser}">
    <!-- 세션 사이드바 -->
    <div class="session-sidebar">
        <div class="session-header">
            <span class="session-header-title">채팅 목록</span>
            <button class="session-new-btn" onclick="createNewSession()">+ 새 채팅</button>
        </div>
        <div class="session-filter session-filter-row">
            <input type="text" class="session-filter-search" placeholder="제목·메시지 검색..."
                   oninput="onSessionSearchInput(this)" autocomplete="off" maxlength="200">
            <select class="session-filter-file" onchange="onFilterChange(this)">
                <option value="">전체 파일</option>
            </select>
            <!-- ADMIN 전용: 사용자별 필터 -->
            <select th:if="${isAdmin}" class="session-filter-user" onchange="onUserFilterChange(this)">
                <option value="">전체 사용자</option>
            </select>
        </div>
        <div class="session-list" id="sessionList">
            <div class="session-empty">채팅 이력이 없습니다.</div>
        </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-area" id="chatArea">
        <button type="button" class="chat-back-btn" onclick="backToSessionList()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            <span>채팅 목록</span>
        </button>
        <div class="chat-empty-state" id="chatEmptyState">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div style="font-size:16px;font-weight:600;color:#6B7280">AI Chat</div>
            <div style="font-size:13px">좌측에서 채팅을 선택하거나 새 채팅을 시작하세요.</div>
        </div>
        <div class="chat-messages" id="chatMessages" style="display:none"></div>
        <div class="chat-input-area" id="chatInputArea" style="display:none">
            <textarea class="chat-textarea" id="chatInput" rows="1" placeholder="질문을 입력하세요..."
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
var _sessions = [];
var _activeSessionId = null;
var _messages = [];
var _sending = false;
var _model = '';
var _renamePending = null;

// 스트리밍 rAF 스로틀
var _chatRafId = null;
var _chatBubbleRef = null;
var _chatPendingText = '';

function _chatSmartScroll(container) {
    if (container.scrollHeight - container.scrollTop - container.clientHeight < 120) {
        container.scrollTop = container.scrollHeight;
    }
}

// ── 권한/현재 사용자 (서버 모델 attr 에서 추출) ───────
var _layoutEl = document.querySelector('.chat-layout');
var IS_ADMIN     = _layoutEl ? _layoutEl.getAttribute('data-is-admin') === 'true' : false;
var CURRENT_USER = _layoutEl ? (_layoutEl.getAttribute('data-current-user') || '') : '';

// ── 초기화 ─────────────────────────────────────────────

function init() {
    loadFilenameFilter();
    if (IS_ADMIN) loadUserFilter();
    loadSessions();
}

function loadFilenameFilter() {
    fetch('/api/ai-chat/sessions').then(function(r){ return r.json(); }).then(function(sessions) {
        var filenames = [];
        sessions.forEach(function(s) {
            if (s.filename && filenames.indexOf(s.filename) === -1) filenames.push(s.filename);
        });
        // 원본 + 배너 클론 모두 옵션 채움
        document.querySelectorAll('.session-filter-file').forEach(function(sel) {
            filenames.forEach(function(f) {
                var opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f.length > 30 ? f.substring(0, 30) + '...' : f;
                sel.appendChild(opt);
            });
        });
    }).catch(function(){});
}

function loadUserFilter() {
    fetch('/api/ai-chat/users').then(function(r){
        if (!r.ok) return [];
        return r.json();
    }).then(function(users) {
        if (!Array.isArray(users)) return;
        document.querySelectorAll('.session-filter-user').forEach(function(sel) {
            users.forEach(function(u) {
                var opt = document.createElement('option');
                opt.value = u; opt.textContent = u;
                sel.appendChild(opt);
            });
        });
    }).catch(function(){});
}

function getCurrentFileFilter() {
    var sel = document.querySelector('.session-filter-file');
    return sel ? sel.value : '';
}

function getCurrentUserFilter() {
    if (!IS_ADMIN) return '';
    var sel = document.querySelector('.session-filter-user');
    return sel ? sel.value : '';
}

function syncFilterValue(value) {
    document.querySelectorAll('.session-filter-file').forEach(function(s) { s.value = value; });
}

function syncUserFilterValue(value) {
    document.querySelectorAll('.session-filter-user').forEach(function(s) { s.value = value; });
}

// 검색어 헬퍼 — 원본/배너 클론 모두 동기화 (CLAUDE.md 함정 8번 패턴)
var _searchDebounce = null;
function getCurrentQuery() {
    var el = document.querySelector('.session-filter-search');
    return el ? (el.value || '').trim() : '';
}
function syncQueryValue(value) {
    document.querySelectorAll('.session-filter-search').forEach(function(el) {
        if (el.value !== value) el.value = value;
    });
}
function onSessionSearchInput(inputEl) {
    syncQueryValue(inputEl.value);
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(loadSessions, 300);
}

function onFilterChange(selectEl) {
    syncFilterValue(selectEl.value);
    loadSessions();
}

function onUserFilterChange(selectEl) {
    syncUserFilterValue(selectEl.value);
    loadSessions();
}

function loadSessions() {
    var fileF = getCurrentFileFilter();
    var userF = getCurrentUserFilter();
    var q     = getCurrentQuery();
    var qs = [];
    if (fileF) qs.push('filename=' + encodeURIComponent(fileF));
    if (userF) qs.push('user='     + encodeURIComponent(userF));
    if (q)     qs.push('q='        + encodeURIComponent(q));
    var url = '/api/ai-chat/sessions' + (qs.length ? '?' + qs.join('&') : '');
    fetch(url).then(function(r){ return r.json(); }).then(function(sessions) {
        _sessions = sessions;
        renderSessionList();
    }).catch(function(){});
}

function renderSessionList() {
    var html;
    if (!_sessions.length) {
        html = '<div class="session-empty">채팅 이력이 없습니다.</div>';
    } else {
        html = '';
        _sessions.forEach(function(s) {
            var active = s.id === _activeSessionId ? ' active' : '';
            var date = s.updatedAt ? s.updatedAt.substring(0, 16).replace('T', ' ') : '';
            var analyzedAt = s.analyzedAt ? s.analyzedAt.substring(0, 16).replace('T', ' ') : '';
            var stateBadge = '';
            var itemClass = 'session-item' + active;
            if (s.analysisState === 'analysisDeleted') {
                stateBadge = '<span class="session-item-state deleted" title="연결된 분석 결과가 삭제되었습니다">분석 삭제됨</span>';
                itemClass += ' is-deleted';
            } else if (s.analysisState === 'previousAnalysis') {
                stateBadge = '<span class="session-item-state previous" title="동일한 파일명으로 새 분석이 이뤄져 이전 분석의 채팅입니다">이전 분석</span>';
            }
            // 사용자 태그: ADMIN 화면에서는 항상 표시, 일반 사용자에겐 (혹시 모를 다른 사람 세션 노출 시) 표시
            var userTag = '';
            if (s.username && (IS_ADMIN || s.username !== CURRENT_USER)) {
                var selfCls = (s.username === CURRENT_USER) ? ' is-self' : '';
                var selfTitle = (s.username === CURRENT_USER) ? ' (본인)' : '';
                userTag = '<div class="session-item-user' + selfCls + '" title="작성자: '
                    + escHtml(s.username) + selfTitle + '">' + escHtml(s.username) + '</div>';
            }
            var titleText = s.title || '새 채팅';
            html += '<div class="' + itemClass + '" data-session-id="' + s.id + '" onclick="selectSession(' + s.id + ')">'
                + '<div class="session-item-head">'
                +   '<div class="session-item-title">' + escHtml(titleText) + '</div>'
                +   '<input class="session-item-title-input" type="text"'
                +        ' data-session-id="' + s.id + '"'
                +        ' value="' + escAttr(titleText) + '"'
                +        ' onclick="event.stopPropagation()"'
                +        ' onkeydown="onRenameKeyDown(event, ' + s.id + ')"'
                +        ' onblur="commitRenameSession(' + s.id + ', this)">'
                +   userTag
                +   '<div class="session-item-actions">'
                +     '<button class="session-edit-btn" title="이름 변경"'
                +          ' onclick="event.stopPropagation();startRenameSession(' + s.id + ', event)">&#9998;</button>'
                +     '<button class="session-del-btn" title="삭제"'
                +          ' onclick="event.stopPropagation();deleteSession(' + s.id + ')">&times;</button>'
                +   '</div>'
                + '</div>'
                + (s.filename ? '<div class="session-item-file">' + escHtml(s.filename) + '</div>' : '')
                + '<div class="session-item-meta"><span>' + (s.messageCount || 0) + '개</span><span>·</span><span>' + date + '</span></div>'
                + (analyzedAt ? '<div class="session-item-analyzed">분석 ' + analyzedAt + '</div>' : '')
                + (stateBadge ? '<div>' + stateBadge + '</div>' : '')
                + '</div>';
        });
    }
    document.querySelectorAll('.session-list').forEach(function(list) { list.innerHTML = html; });
}

// ── 세션 관리 ──────────────────────────────────────────

function createNewSession() {
    var filter = getCurrentFileFilter();
    fetch('/api/ai-chat/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: filter || '', title: '새 채팅' })
    })
    .then(checkAuth)
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success) {
            selectSession(d.sessionId);
            loadSessions();
        }
    })
    .catch(function(e) { alert(e.message); });
}

function selectSession(id) {
    _activeSessionId = id;
    document.getElementById('chatEmptyState').style.display = 'none';
    document.getElementById('chatMessages').style.display = '';
    document.getElementById('chatInputArea').style.display = '';
    renderSessionList();
    loadMessages(id);
    // 모바일에서는 채팅 본문이 보이도록 배너 자동 닫기 + 인라인 사이드바→채팅 영역 전환
    if (window.innerWidth <= 900 && typeof closeMobileBanner === 'function') {
        closeMobileBanner();
    }
    if (window.innerWidth <= 640) {
        document.body.classList.add('mobile-chat-active');
    }
}

// 모바일에서 채팅 영역 → 채팅 목록으로 복귀
function backToSessionList() {
    document.body.classList.remove('mobile-chat-active');
}

function deleteSession(id) {
    if (!confirm('이 채팅을 삭제하시겠습니까?')) return;
    fetch('/api/ai-chat/sessions/' + id, { method: 'DELETE' })
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success) {
            if (_activeSessionId === id) {
                _activeSessionId = null;
                _messages = [];
                document.getElementById('chatMessages').innerHTML = '';
                document.getElementById('chatMessages').style.display = 'none';
                document.getElementById('chatInputArea').style.display = 'none';
                document.getElementById('chatEmptyState').style.display = '';
                document.body.classList.remove('mobile-chat-active');
            }
            loadSessions();
        }
    });
}

// ── 세션 이름 변경 (inline rename) ───────────────────────

function startRenameSession(id, evt) {
    var card = evt.currentTarget.closest('.session-item');
    if (!card) return;
    // 다른 카드가 rename 중이면 그쪽을 먼저 정리
    document.querySelectorAll('.session-item.is-renaming').forEach(function(other) {
        if (other !== card) {
            var otherInput = other.querySelector('.session-item-title-input');
            if (otherInput) otherInput.blur();
            other.classList.remove('is-renaming');
        }
    });
    card.classList.add('is-renaming');
    var input = card.querySelector('.session-item-title-input');
    if (input) {
        // 원본 title 을 dataset 에 백업 (cancel 시 복원용)
        var orig = _sessions.find(function(s){ return s.id === id; });
        input.dataset.origTitle = orig ? (orig.title || '새 채팅') : input.value;
        input.value = input.dataset.origTitle;
        setTimeout(function() { input.focus(); input.select(); }, 0);
    }
}

function onRenameKeyDown(evt, id) {
    if (evt.key === 'Enter') {
        evt.preventDefault();
        commitRenameSession(id, evt.target);
    } else if (evt.key === 'Escape') {
        evt.preventDefault();
        _renamePending = 'cancelled';
        cancelRenameSession(id, evt.target);
        evt.target.blur();
    }
}

function commitRenameSession(id, inputEl) {
    if (_renamePending === 'cancelled') {
        _renamePending = null;
        return;
    }
    if (_renamePending === id) return; // 중복 제출 방지
    var orig = _sessions.find(function(s){ return s.id === id; });
    var origTitle = orig ? (orig.title || '새 채팅') : '';
    var newTitle = (inputEl.value || '').trim();
    if (!newTitle || newTitle === origTitle) {
        cancelRenameSession(id, inputEl);
        return;
    }
    _renamePending = id;
    fetch('/api/ai-chat/sessions/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle })
    })
    .then(checkAuth)
    .then(function(r){ return r.json(); })
    .then(function(d) {
        _renamePending = null;
        if (d && d.success) {
            if (orig) orig.title = d.title || newTitle;
            renderSessionList();
        } else {
            alert((d && d.error) || '이름 변경 실패');
            cancelRenameSession(id, inputEl);
        }
    })
    .catch(function(e) {
        _renamePending = null;
        alert((e && e.message) || '이름 변경 실패');
        cancelRenameSession(id, inputEl);
    });
}

function cancelRenameSession(id, inputEl) {
    var cards = document.querySelectorAll('.session-item[data-session-id="' + id + '"]');
    cards.forEach(function(c) { c.classList.remove('is-renaming'); });
    var orig = _sessions.find(function(s){ return s.id === id; });
    var origTitle = orig ? (orig.title || '새 채팅') : '';
    if (inputEl) inputEl.value = origTitle;
    // 양쪽 input value 도 원복
    document.querySelectorAll('.session-item-title-input[data-session-id="' + id + '"]').forEach(function(el) {
        el.value = origTitle;
    });
}

// ── 메시지 ─────────────────────────────────────────────

function loadMessages(sessionId) {
    fetch('/api/ai-chat/sessions/' + sessionId + '/messages')
    .then(function(r){ return r.json(); })
    .then(function(messages) {
        _messages = messages.map(function(m) { return { role: m.role, content: m.content }; });
        var container = document.getElementById('chatMessages');
        container.innerHTML = '';
        if (!messages.length) {
            var div = document.createElement('div');
            div.className = 'chat-msg chat-msg-welcome';
            div.innerHTML = '<strong>AI Chat</strong><br>질문을 입력하여 대화를 시작하세요.';
            container.appendChild(div);
        } else {
            var lastDate = '';
            messages.forEach(function(m) {
                var dateStr = extractDate(m.createdAt);
                if (dateStr && dateStr !== lastDate) {
                    appendDateSep(dateStr);
                    lastDate = dateStr;
                }
                appendMsg(m.role, m.content, m.createdAt);
            });
        }
        container.scrollTop = container.scrollHeight;
    });
}

function appendMsg(role, content, createdAt) {
    var container = document.getElementById('chatMessages');
    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-direction:column;' + (role === 'user' ? 'align-items:flex-end' : 'align-items:flex-start');
    var div = document.createElement('div');
    div.className = 'chat-msg chat-msg-' + role;
    if (role === 'assistant') {
        div.innerHTML = mdRender(content);
    } else {
        div.textContent = content;
    }
    wrapper.appendChild(div);
    var timeStr = extractTime(createdAt);
    if (timeStr) {
        var timeDiv = document.createElement('div');
        timeDiv.className = 'chat-msg-time';
        timeDiv.textContent = timeStr;
        wrapper.appendChild(timeDiv);
    }
    container.appendChild(wrapper);
}

function appendDateSep(dateStr) {
    var container = document.getElementById('chatMessages');
    var sep = document.createElement('div');
    sep.className = 'chat-date-sep';
    sep.innerHTML = '<span class="chat-date-label">' + escHtml(dateStr) + '</span>';
    container.appendChild(sep);
}

function extractDate(dt) {
    if (!dt) return '';
    var d = new Date(dt);
    if (isNaN(d.getTime())) return '';
    var now = new Date();
    var y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
    if (y === now.getFullYear() && m === now.getMonth() && day === now.getDate()) return '오늘';
    var yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    if (y === yesterday.getFullYear() && m === yesterday.getMonth() && day === yesterday.getDate()) return '어제';
    return y + '년 ' + (m + 1) + '월 ' + day + '일';
}

function extractTime(dt) {
    if (!dt) return '';
    var d = new Date(dt);
    if (isNaN(d.getTime())) return '';
    var h = d.getHours(), mi = d.getMinutes();
    var ampm = h < 12 ? '오전' : '오후';
    var h12 = h % 12 || 12;
    return ampm + ' ' + h12 + ':' + (mi < 10 ? '0' : '') + mi;
}

function sendMessage() {
    if (_sending || !_activeSessionId) return;
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;

    var now = new Date().toISOString();
    var todayDate = extractDate(now);
    var dateSeps = document.getElementById('chatMessages').querySelectorAll('.chat-date-label');
    var lastDateText = dateSeps.length ? dateSeps[dateSeps.length - 1].textContent : '';
    if (todayDate && todayDate !== lastDateText) appendDateSep(todayDate);
    _messages.push({ role: 'user', content: text });
    appendMsg('user', text, now);
    input.value = '';
    input.style.height = 'auto';

    _sending = true;
    document.getElementById('chatSendBtn').disabled = true;

    // typing
    var container = document.getElementById('chatMessages');
    var typing = document.createElement('div');
    typing.className = 'chat-typing';
    typing.innerHTML = '<div class="chat-typing-dot"></div><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div>';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;

    // 스트리밍 버블 준비
    var bubbleWrapper = document.createElement('div');
    bubbleWrapper.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start';
    var bubble = document.createElement('div');
    bubble.className = 'chat-msg chat-msg-assistant';
    bubble.innerHTML = '<span class="chat-cursor">&#9612;</span>';
    bubbleWrapper.appendChild(bubble);

    var fullText = '';

    fetch('/api/ai-chat/sessions/' + _activeSessionId + '/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: _messages, context: '', filename: '' })
    })
    .then(function(response) {
        checkAuth(response);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        if (typing.parentNode) typing.parentNode.removeChild(typing);
        container.appendChild(bubbleWrapper);

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var currentEvent = '';

        function process() {
            return reader.read().then(function(result) {
                if (result.done) {
                    if (buffer.trim()) parseBuf(buffer);
                    finish();
                    return;
                }
                buffer += decoder.decode(result.value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                lines.forEach(function(line) {
                    if (line.indexOf('event:') === 0) currentEvent = line.substring(6).trim();
                    else if (line.indexOf('data:') === 0) {
                        try {
                            var d = JSON.parse(line.substring(5).trim());
                            if (currentEvent === 'start' && d.model) _model = d.model;
                            else if (currentEvent === 'chunk' && d.text) {
                                fullText += d.text;
                                _chatBubbleRef = bubble;
                                _chatPendingText = fullText;
                                if (!_chatRafId) {
                                    _chatRafId = requestAnimationFrame(function() {
                                        _chatRafId = null;
                                        if (!_chatBubbleRef) return;
                                        _chatBubbleRef.innerHTML = mdRender(_chatPendingText) + '<span class="chat-cursor">&#9612;</span>';
                                        _chatSmartScroll(container);
                                    });
                                }
                            } else if (currentEvent === 'error') {
                                var err = document.createElement('div');
                                err.className = 'chat-msg chat-msg-error';
                                err.textContent = (d.errorCode ? '[' + d.errorCode + '] ' : '') + (d.error || 'Error');
                                container.appendChild(err);
                                _messages.pop();
                            }
                        } catch(e){}
                        currentEvent = '';
                    }
                });
                return process();
            });
        }

        function parseBuf(b) { b.split('\n').forEach(function(l) { /* handled inline */ }); }

        function finish() {
            // 미처리 rAF 취소 — 최종 렌더를 여기서 직접 수행
            if (_chatRafId) { cancelAnimationFrame(_chatRafId); _chatRafId = null; }
            _chatBubbleRef = null;
            if (fullText) {
                bubble.innerHTML = mdRender(fullText);
                container.scrollTop = container.scrollHeight;
                _messages.push({ role: 'assistant', content: fullText });
                var timeDiv = document.createElement('div');
                timeDiv.className = 'chat-msg-time';
                timeDiv.textContent = extractTime(new Date().toISOString());
                bubbleWrapper.appendChild(timeDiv);
            } else if (bubbleWrapper.parentNode) {
                bubbleWrapper.parentNode.removeChild(bubbleWrapper);
            }
            _sending = false;
            document.getElementById('chatSendBtn').disabled = false;
            document.getElementById('chatInput').focus();
            loadSessions(); // 세션 목록 갱신 (제목/시간)
        }

        return process();
    })
    .catch(function(e) {
        if (typing.parentNode) typing.parentNode.removeChild(typing);
        var err = document.createElement('div');
        err.className = 'chat-msg chat-msg-error';
        err.textContent = '네트워크 오류: ' + e.message;
        container.appendChild(err);
        _messages.pop();
        _sending = false;
        document.getElementById('chatSendBtn').disabled = false;
    });
}

// ── 인증 체크 ─────────────────────────────────────────

function checkAuth(r) {
    if (r.redirected || r.status === 401 || r.status === 403 || r.status === 302) {
        throw new Error('로그인이 만료되었습니다. 페이지를 새로고침 해주세요.');
    }
    var ct = r.headers.get('content-type') || '';
    if (!ct.includes('application/json') && !ct.includes('text/event-stream')) {
        throw new Error('로그인이 만료되었습니다. 페이지를 새로고침 해주세요.');
    }
    return r;
}

// ── 유틸 ───────────────────────────────────────────────

// escHtml → Common.escHtml (common.js). Common 은 5 문자(`&<>"'`) escape 라 기존 3 문자 버전보다 방어적.
var escHtml = Common.escHtml;

function escAttr(t) {
    return escHtml(t).replace(/"/g,'&quot;');
}

function mdRender(text) {
    if (!text) return '';
    var s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m,lang,code) {
        return '<pre><code>' + code.trim() + '</code></pre>';
    });
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\n/g, '<br>');
    s = s.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, function(m,c) {
        return '<pre><code>' + c.replace(/<br>/g, '\n') + '</code></pre>';
    });
    return s;
}

// textarea auto-resize
document.addEventListener('DOMContentLoaded', function() {
    var ta = document.getElementById('chatInput');
    if (ta) ta.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    // 모바일 배너 Chat 탭에 사이드바 클론 등록 (ID 충돌 방지: 클론 내부 ID 제거)
    if (typeof registerBannerChatTab === 'function') {
        var origSidebar = document.querySelector('.session-sidebar');
        if (origSidebar) {
            var clone = origSidebar.cloneNode(true);
            clone.querySelectorAll('[id]').forEach(function(el) { el.removeAttribute('id'); });
            registerBannerChatTab(clone);
        }
    }
    init();
});

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap Dump Analyzer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="header-title">📊 Heap Dump Analyzer</h1>
            <p class="header-subtitle">Java Memory Analysis Tool</p>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container main-content">
        
        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Upload Section -->
        <section class="section">
            <h2 class="section-title">📤 Upload Heap Dump File</h2>
            <div class="upload-box">
                <form id="uploadForm" method="post" action="/upload" enctype="multipart/form-data">
                    <div class="file-input-wrapper">
                        <input type="file" 
                               id="fileInput" 
                               name="file" 
                               accept=".hprof,.bin,.dump"
                               required
                               class="file-input">
                        <label for="fileInput" class="file-label">
                            <span class="file-icon">📁</span>
                            <span id="fileName">Choose a file or drag it here</span>
                            <span class="file-hint">Supported: .hprof, .bin, .dump (Max: 2GB)</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span>Upload File</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- File List Section -->
        <section class="section">
            <h2 class="section-title">📁 Available Files (<span th:text="${fileCount}">0</span>)</h2>
            
            <div th:if="${#lists.isEmpty(files)}" class="empty-state">
                <p>No files uploaded yet. Upload a heap dump file to get started.</p>
            </div>
            
            <div th:if="${!#lists.isEmpty(files)}" class="file-list">
                <div th:each="file : ${files}" class="file-card">
                    <div class="file-info">
                        <div class="file-name" th:text="${file.name}">dump.hprof</div>
                        <div class="file-meta">
                            <span class="file-size" th:text="${file.formattedSize}">460 MB</span>
                            <span class="file-separator">•</span>
                            <span class="file-date" th:text="${#dates.format(file.lastModified, 'yyyy-MM-dd HH:mm:ss')}">2024-01-15 10:30:00</span>
                        </div>
                    </div>
                    <div class="file-actions">
                        <a th:href="@{/analyze/{filename}(filename=${file.name})}" 
                           class="btn btn-primary btn-sm">
                            Analyze
                        </a>
                        <a th:href="@{/download/{filename}(filename=${file.name})}" 
                           class="btn btn-secondary btn-sm">
                            Download
                        </a>
                        <a th:href="@{/delete/{filename}(filename=${file.name})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this file?');">
                            Delete
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2024 Heap Dump Analyzer v1.0.0 | Java Memory Analysis Tool</p>
        </div>
    </footer>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>

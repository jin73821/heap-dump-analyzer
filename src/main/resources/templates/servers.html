<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/common.css?v=2026-05-24a">
    <title>Target Servers — Heap Dump Analyzer</title>
    <style>
        /* topbar 는 anti-wrap 확장이 있어 인라인 유지 */
        .topbar { position: fixed; top: 0; left: var(--banner-w, 220px); right: 0; z-index: 100; height: 52px;
                  transition: left .25s cubic-bezier(.4,0,.2,1);
                  background: #fff; border-bottom: 1px solid #E5E7EB;
                  display: flex; align-items: center; justify-content: space-between;
                  padding: 0 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); gap: 10px; }
        .topbar-brand { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1 1 auto; }
        .topbar-title { font-size: 16px; font-weight: 700;
                        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .topbar-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #E5E7EB;
                      border-radius: 6px; background: transparent; color: #6B7280;
                      cursor: pointer; text-decoration: none; }
        .topbar-btn:hover { background: #F9FAFB; }
        .container { max-width: 1440px; margin: 0 auto; padding: 68px 20px 40px;
                     padding-left: calc(var(--banner-w, 220px) + 20px);
                     transition: padding-left .25s cubic-bezier(.4,0,.2,1); }
        .page-hdr { display: flex; align-items: center; justify-content: space-between;
                    margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .page-ttl { font-size: 18px; font-weight: 700; }
        .btn-primary { padding: 8px 16px; border: none; border-radius: 8px; background: #2563EB;
                       color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-primary:hover { background: #1D4ED8; }

        .panel { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; overflow: hidden; }
        /* .stable base/thead/td 색상·hover 는 common.css 에서 제공. padding/font-size + 페이지 고유 td a:hover 만 인라인 */
        .stable th { padding: 12px 16px; font-size: 12px; }
        .stable td { padding: 12px 16px; }
        .stable td a:hover { text-decoration: underline; }
        .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
        .badge-on { background: #D1FAE5; color: #065F46; }
        .badge-fail { background: #FEE2E2; color: #991B1B; }
        .badge-off { background: #F3F4F6; color: #6B7280; }
        .badge-auto { background: #DBEAFE; color: #1E40AF; }
        .empty-msg { text-align: center; padding: 32px; color: #9CA3AF; font-size: 14px; }
        .no-match { display: none; text-align: center; padding: 32px; color: #9CA3AF; font-size: 14px; }

        /* Toolbar */
        .table-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-bar { flex: 1; min-width: 220px; padding: 10px 14px; border: 1px solid #E5E7EB;
                      border-radius: 8px; font-size: 13px; outline: none; background: #fff; }
        .search-bar:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .page-size-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .page-size-label { font-size: 12px; color: #6B7280; white-space: nowrap; }
        .page-size-select { padding: 8px 28px 8px 10px; font-size: 13px; border: 1px solid #E5E7EB;
                            border-radius: 6px; background: #fff; outline: none; cursor: pointer;
                            appearance: none; -webkit-appearance: none;
                            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236B7280' d='M0 0l5 6 5-6z'/></svg>");
                            background-repeat: no-repeat; background-position: right 10px center; }
        .page-size-select:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

        /* Sortable headers */
        /* .stable sortable cursor/hover/sort-active 색상은 common.css 에서 제공. sort-arrow 는 font-size 10px 변형이라 인라인 */
        .stable th.sortable .sort-arrow { display: inline-block; margin-left: 4px; opacity: .3;
                                          font-size: 10px; transition: opacity .15s; }

        /* Pagination */
        .pagination-bar { display: none; align-items: center; justify-content: space-between;
                          margin-top: 16px; padding: 12px 4px; gap: 12px; flex-wrap: wrap; }
        .pagination-bar.show { display: flex; }
        .pg-info { font-size: 12px; color: #6B7280; }
        .pg-list { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .pg-btn { min-width: 32px; height: 32px; padding: 0 8px; border: 1px solid #E5E7EB;
                  background: #fff; border-radius: 6px; font-size: 12px; color: #374151;
                  cursor: pointer; transition: background .15s, border-color .15s; }
        .pg-btn:hover:not(:disabled):not(.active) { background: #F3F4F6; border-color: #D1D5DB; }
        .pg-btn.active { background: #2563EB; color: #fff; border-color: #2563EB; cursor: default; }
        .pg-btn:disabled { color: #D1D5DB; cursor: not-allowed; background: #F9FAFB; }
        .pg-ellipsis { font-size: 12px; color: #9CA3AF; padding: 0 4px; }

        .actions-cell { white-space: nowrap; }
        .action-btn { padding: 5px 12px; border: 1px solid #E5E7EB; border-radius: 5px;
                      background: transparent; font-size: 12px; cursor: pointer; color: #6B7280;
                      font-family: inherit; }
        .action-btn + .action-btn { margin-left: 4px; }
        .action-btn:hover { border-color: #93C5FD; background: #EFF6FF; color: #2563EB; }
        .action-btn.scan { background: #059669; color: #fff; border-color: #059669; }
        .action-btn.scan:hover { background: #047857; }
        .action-btn.danger:hover { border-color: #FCA5A5; background: #FEF2F2; color: #EF4444; }

        /* Scan result panel */
        .scan-panel { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;
                      padding: 16px; margin-top: 16px; display: none; }
        .scan-panel.open { display: block; }
        .scan-title { font-size: 14px; font-weight: 700; margin-bottom: 12px;
                      display: flex; align-items: center; justify-content: space-between; }
        .scan-file { display: flex; align-items: center; gap: 10px; padding: 8px 0;
                     border-bottom: 1px solid #F3F4F6; font-size: 13px; }
        .scan-file:last-child { border-bottom: none; }
        .scan-transferred { color: #9CA3AF; }
        .btn-transfer { padding: 4px 10px; border: 1px solid #2563EB; border-radius: 5px;
                        background: #2563EB; color: #fff; font-size: 11px; cursor: pointer; }
        .btn-transfer:hover { background: #1D4ED8; }
        .btn-transfer:disabled { background: #9CA3AF; border-color: #9CA3AF; cursor: default; }
        .transfer-progress { display: inline-flex; align-items: center; gap: 8px; min-width: 260px; }
        .transfer-bar { width: 140px; height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden; }
        .transfer-bar-fill { height: 100%; border-radius: 4px; background: #2563EB;
                             width: 0; transition: width 0.25s ease; }
        .transfer-bar-fill.indeterminate { width: 100%;
                             animation: transferPulse 1.5s ease-in-out infinite; }
        .transfer-bar-fill.done { background: #059669; animation: none; width: 100%; }
        .transfer-bar-fill.fail { background: #EF4444; animation: none; width: 100%; }
        .transfer-label { font-size: 11px; color: #4B5563; white-space: nowrap;
                          font-variant-numeric: tabular-nums; }
        @keyframes transferPulse {
            0% { opacity: .4; transform: scaleX(.3); transform-origin: left; }
            50% { opacity: 1; transform: scaleX(1); transform-origin: left; }
            100% { opacity: .4; transform: scaleX(.3); transform-origin: right; }
        }

        /* Modal */
        .modal-ov { display: none; position: fixed; inset: 0; z-index: 200;
                    background: rgba(0,0,0,.4); align-items: center; justify-content: center; }
        .modal-ov.open { display: flex; }
        .modal-box { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 500px;
                     box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: modalIn .2s ease; }
        @keyframes modalIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .modal-ttl { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
        .modal-group { margin-bottom: 14px; }
        .modal-label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
        .modal-input { width: 100%; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 7px;
                       font-size: 13px; outline: none; }
        .modal-input:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .modal-row { display: flex; gap: 12px; }
        .modal-row .modal-group { flex: 1; }
        .modal-check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
        .modal-check input { width: 16px; height: 16px; accent-color: #2563EB; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
        .modal-btns button { padding: 8px 18px; border-radius: 7px; font-size: 13px; border: none;
                             cursor: pointer; font-weight: 500; }
        /* .mbtn-cancel / .mbtn-save / .mbtn-del 색상은 common.css 에서 제공 */

        /* Toast */
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
                 padding: 10px 24px; border-radius: 8px; font-size: 13px; font-weight: 500;
                 z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.success { background: #D1FAE5; color: #065F46; border: 1px solid #A7F3D0; }
        .toast.error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }

        @media (max-width: 900px) {
            .topbar { left: 0; }
            .container { padding-left: 20px; }
            /* 검색은 한 줄 전체 / 상태·자동탐지·행표시는 한 줄에 3등분 배치 */
            .table-toolbar { align-items: center; gap: 8px; }
            .search-bar { flex: 1 1 100%; min-width: 0; }
            .page-size-wrap { flex: 1 1 0; min-width: 0; gap: 5px; }
            .page-size-label { font-size: 11px; }
            .page-size-select { flex: 1 1 auto; min-width: 0;
                                padding: 8px 22px 8px 8px; background-position: right 7px center; }
            .pagination-bar { flex-direction: column; align-items: stretch; }
            .pg-list { justify-content: center; }
            .panel { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }
        @media (max-width: 640px) {
            .topbar { padding: 0 12px; gap: 8px; }
            .topbar-title { font-size: 15px; }
            .topbar-right { gap: 4px; }
            .topbar-right .topbar-btn { padding: 5px 8px; font-size: 11px; }
            /* 우선순위 낮은 컬럼 숨김 (SSH 계정/덤프 경로/자동탐지) */
            .stable .col-hide-sm { display: none; }
            .stable th, .stable td { padding: 10px 10px; }
            .stable { font-size: 12px; }
            /* 작업 버튼 정확한 2×2 그리드 (스캔·테스트 / 수정·삭제) */
            .actions-cell {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4px;
                min-width: 110px;
            }
            .actions-cell .action-btn {
                padding: 6px 6px; font-size: 11px; margin: 0;
                width: 100%; text-align: center; line-height: 1.2;
            }
            .actions-cell .action-btn + .action-btn { margin-left: 0; }
            .page-hdr { gap: 6px; }
            .page-ttl { font-size: 16px; }
            .btn-primary { padding: 7px 14px; font-size: 12px; }
            .badge { font-size: 10px; padding: 2px 7px; }
        }
        @media (min-width: 1024px) {
            .stable { font-size: 15px; }
            .stable th { font-size: 13px; padding: 14px 18px; }
            .stable td { padding: 14px 18px; }
            .page-ttl { font-size: 20px; }
            .btn-primary { font-size: 14px; padding: 9px 18px; }
            .action-btn { font-size: 13px; padding: 6px 14px; }
            .badge { font-size: 12px; }
            .scan-file { font-size: 14px; padding: 10px 0; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/banner :: banner}"></div>

<div class="topbar">
    <div class="topbar-brand">
        <button class="gb-menu-btn" id="menuBtn" onclick="toggleMobileBanner()" aria-label="Menu"><span></span><span></span><span></span></button>
        <span class="topbar-title">Servers</span>
    </div>
    <div class="topbar-right">
        <a href="/servers/logs" class="topbar-btn">Transfer Logs</a>
        <a href="/" class="topbar-btn">&larr; Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="page-hdr">
        <div class="page-ttl">Target Servers</div>
        <button class="btn-primary" onclick="openCreateModal()">+ 서버 추가</button>
    </div>

    <div th:if="${#lists.isEmpty(servers)}" class="panel">
        <div class="empty-msg">등록된 서버가 없습니다. 서버를 추가하세요.</div>
    </div>

    <div th:unless="${#lists.isEmpty(servers)}">
        <div class="table-toolbar">
            <input type="text" class="search-bar" id="searchInput"
                   placeholder="이름 / 호스트 / SSH 계정 / 덤프 경로 검색..." oninput="onSearchInput()">
            <div class="page-size-wrap">
                <span class="page-size-label">상태</span>
                <select class="page-size-select" id="statusFilter" onchange="applyFilter()">
                    <option value="all">전체</option>
                    <option value="OK">정상</option>
                    <option value="FAIL">실패</option>
                    <option value="UNKNOWN">미확인</option>
                    <option value="DISABLED">비활성</option>
                </select>
            </div>
            <div class="page-size-wrap">
                <span class="page-size-label">자동탐지</span>
                <select class="page-size-select" id="autoDetectFilter" onchange="applyFilter()">
                    <option value="all">전체</option>
                    <option value="on">ON</option>
                    <option value="off">OFF</option>
                </select>
            </div>
            <div class="page-size-wrap">
                <span class="page-size-label">행 표시</span>
                <select class="page-size-select" id="pageSizeSelect" onchange="onPageSizeChange()">
                    <option value="20" selected>20</option>
                    <option value="30">30</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>

        <div class="panel">
            <table class="stable" id="serversTable">
                <thead>
                    <tr>
                        <th class="sortable" data-sort-key="name" data-sort-type="str" onclick="onHeaderSort(this)">이름 <span class="sort-arrow">▲</span></th>
                        <th class="sortable" data-sort-key="host" data-sort-type="str" onclick="onHeaderSort(this)">호스트 <span class="sort-arrow">▲</span></th>
                        <th class="col-hide-sm sortable" data-sort-key="sshuser" data-sort-type="str" onclick="onHeaderSort(this)">SSH 계정 <span class="sort-arrow">▲</span></th>
                        <th class="col-hide-sm sortable" data-sort-key="dumppath" data-sort-type="str" onclick="onHeaderSort(this)">덤프 경로 <span class="sort-arrow">▲</span></th>
                        <th class="sortable" data-sort-key="status" data-sort-type="str" onclick="onHeaderSort(this)">상태 <span class="sort-arrow">▲</span></th>
                        <th class="col-hide-sm sortable" data-sort-key="autodetect" data-sort-type="str" onclick="onHeaderSort(this)">자동탐지 <span class="sort-arrow">▲</span></th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="serverTableBody">
                    <tr th:each="s : ${servers}"
                        th:data-id="${s.id}"
                        th:data-name="${s.name}"
                        th:data-host="${s.host + ':' + s.port}"
                        th:data-sshuser="${s.sshUser}"
                        th:data-dumppath="${s.dumpPath}"
                        th:data-autodetect="${s.autoDetect}"
                        th:data-enabled="${s.enabled}"
                        th:attr="data-status=${!s.enabled ? 'DISABLED' : (s.connStatus == null ? 'UNKNOWN' : s.connStatus)}">
                        <td style="font-weight:600">
                            <a th:href="@{'/servers/' + ${s.id}}" th:text="${s.name}"
                               style="color:#2563EB;text-decoration:none">server1</a>
                        </td>
                        <td th:text="${s.host + ':' + s.port}">192.168.1.1:22</td>
                        <td class="col-hide-sm" th:text="${s.sshUser}">sscuser</td>
                        <td class="col-hide-sm" style="font-size:12px;color:#6B7280;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                            th:title="${s.dumpPath}"
                            th:with="paths=${s.dumpPaths}">
                            <span th:text="${#lists.isEmpty(paths) ? '-' : paths[0]}">/opt/dumps</span>
                            <span th:if="${#lists.size(paths) > 1}" style="color:#9CA3AF;margin-left:4px"
                                  th:text="'+' + (${#lists.size(paths)} - 1)">+1</span>
                        </td>
                        <td>
                            <span th:unless="${s.enabled}" class="badge badge-off">비활성</span>
                            <span th:if="${s.enabled and s.connStatus == 'OK'}" class="badge badge-on">정상</span>
                            <span th:if="${s.enabled and s.connStatus == 'FAIL'}" class="badge badge-fail"
                                  th:title="${s.lastError}">실패</span>
                            <span th:if="${s.enabled and (s.connStatus == null or s.connStatus == 'UNKNOWN')}" class="badge badge-off">미확인</span>
                        </td>
                        <td class="col-hide-sm">
                            <span class="badge badge-auto" th:if="${s.autoDetect}">ON</span>
                            <span class="badge badge-off" th:unless="${s.autoDetect}">OFF</span>
                        </td>
                        <td class="actions-cell">
                            <button class="action-btn scan"
                                    th:data-id="${s.id}" th:data-name="${s.name}"
                                    onclick="scanServer(this.dataset.id, this.dataset.name)">스캔</button>
                            <button class="action-btn"
                                    th:data-id="${s.id}" th:data-name="${s.name}"
                                    onclick="testConn(this.dataset.id)">테스트</button>
                            <button class="action-btn"
                                    th:data-id="${s.id}" th:data-name="${s.name}"
                                    th:data-host="${s.host}" th:data-port="${s.port}"
                                    th:data-sshuser="${s.sshUser}" th:data-dumppath="${s.dumpPath}"
                                    th:data-autodetect="${s.autoDetect}" th:data-enabled="${s.enabled}"
                                    onclick="openEditModal(this.dataset)">수정</button>
                            <button class="action-btn danger"
                                    th:data-id="${s.id}" th:data-name="${s.name}"
                                    onclick="openDeleteModal(this.dataset.id, this.dataset.name)">삭제</button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="no-match" id="noMatch">검색 결과가 없습니다.</div>
        </div>

        <div class="pagination-bar" id="paginationBar">
            <div class="pg-info" id="pgInfo"></div>
            <div class="pg-list" id="pgList"></div>
        </div>
    </div>

    <!-- Auto-scan errors -->
    <div id="scanErrorsPanel" style="display:none;margin-bottom:16px"></div>

    <!-- Scan results -->
    <div class="scan-panel" id="scanPanel">
        <div class="scan-title">
            <span><span id="scanServerName"></span> — Remote Dump Files</span>
            <div style="display:flex;gap:6px;align-items:center">
                <button class="btn-transfer" id="btnTransferAll" style="display:none;font-size:11px;padding:4px 12px" onclick="transferAll()">All Transfer</button>
                <button class="action-btn" onclick="closeScanPanel()" style="font-size:12px">&times; 닫기</button>
            </div>
        </div>
        <div id="scanResults"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- Create/Edit Modal -->
<div class="modal-ov" id="serverModal" >
    <div class="modal-box">
        <div class="modal-ttl" id="serverModalTitle">서버 추가</div>
        <input type="hidden" id="smId">
        <div class="modal-group">
            <label class="modal-label">서버 이름</label>
            <input class="modal-input" id="smName" placeholder="예: WAS-01">
        </div>
        <div class="modal-row">
            <div class="modal-group">
                <label class="modal-label">호스트 (IP)</label>
                <input class="modal-input" id="smHost" placeholder="192.168.1.100">
            </div>
            <div class="modal-group" style="max-width:100px">
                <label class="modal-label">포트</label>
                <input class="modal-input" id="smPort" type="number" value="22">
            </div>
        </div>
        <div class="modal-row">
            <div class="modal-group">
                <label class="modal-label">SSH 계정</label>
                <input class="modal-input" id="smSshUser" value="sscuser">
            </div>
        </div>
        <div class="modal-group">
            <label class="modal-label">덤프 파일 경로 <span style="font-weight:400;color:#9CA3AF;font-size:11px">(최대 5개 — 추가된 모든 경로를 스캔)</span></label>
            <div id="smDumpPathList"></div>
            <button type="button" class="action-btn" id="smDumpPathAdd"
                    style="margin-top:6px;font-size:11px;padding:4px 10px"
                    onclick="addDumpPathRow()">+ 경로 추가</button>
        </div>
        <div class="modal-group">
            <label class="modal-check">
                <input type="checkbox" id="smAutoDetect">
                자동 탐지 활성화 (주기적으로 새 덤프 파일 탐지 및 전송)
            </label>
        </div>
        <div class="modal-btns">
            <button class="mbtn-cancel" onclick="closeModal('serverModal')">취소</button>
            <button class="mbtn-save" id="smSaveBtn" onclick="submitServer()">저장</button>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal-ov" id="deleteModal" >
    <div class="modal-box">
        <div class="modal-ttl">서버 삭제</div>
        <input type="hidden" id="dmId">
        <p style="font-size:13px;color:#6B7280;margin-bottom:16px">
            <strong id="dmName"></strong> 서버를 삭제하시겠습니까?<br>전송 이력도 함께 삭제됩니다.
        </p>
        <div class="modal-btns">
            <button class="mbtn-cancel" onclick="closeModal('deleteModal')">취소</button>
            <button class="mbtn-del" onclick="submitDelete()">삭제</button>
        </div>
    </div>
</div>

<script>
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 3000);
}

var _isEdit = false;

var MAX_DUMP_PATHS = 5;

function setDumpPaths(paths) {
    var list = document.getElementById('smDumpPathList');
    list.innerHTML = '';
    var arr = (paths && paths.length > 0) ? paths : [''];
    for (var i = 0; i < arr.length && i < MAX_DUMP_PATHS; i++) {
        appendDumpPathRow(arr[i]);
    }
    refreshDumpPathAddBtn();
}

function appendDumpPathRow(value) {
    var list = document.getElementById('smDumpPathList');
    if (list.children.length >= MAX_DUMP_PATHS) return;
    var row = document.createElement('div');
    row.className = 'sm-path-row';
    row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px';
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'modal-input sm-path-input';
    input.placeholder = '/opt/app/logs';
    input.value = value || '';
    input.style.flex = '1';
    var rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'action-btn';
    rm.textContent = '−';
    rm.style.cssText = 'flex-shrink:0;padding:0 12px';
    rm.onclick = function() { row.remove(); refreshDumpPathAddBtn(); };
    row.appendChild(input);
    row.appendChild(rm);
    list.appendChild(row);
}

function addDumpPathRow() {
    appendDumpPathRow('');
    refreshDumpPathAddBtn();
}

function refreshDumpPathAddBtn() {
    var btn = document.getElementById('smDumpPathAdd');
    var count = document.querySelectorAll('#smDumpPathList .sm-path-row').length;
    if (btn) btn.style.display = count >= MAX_DUMP_PATHS ? 'none' : '';
}

function collectDumpPaths() {
    var inputs = document.querySelectorAll('#smDumpPathList .sm-path-input');
    var out = [];
    var seen = {};
    for (var i = 0; i < inputs.length; i++) {
        var v = inputs[i].value.trim();
        if (v && !seen[v]) { seen[v] = 1; out.push(v); }
    }
    return out;
}

function openCreateModal() {
    _isEdit = false;
    document.getElementById('serverModalTitle').textContent = '서버 추가';
    document.getElementById('smId').value = '';
    document.getElementById('smName').value = '';
    document.getElementById('smHost').value = '';
    document.getElementById('smPort').value = '22';
    document.getElementById('smSshUser').value = 'sscuser';
    setDumpPaths([]);
    document.getElementById('smAutoDetect').checked = false;
    document.getElementById('serverModal').classList.add('open');
}

function openEditModal(ds) {
    _isEdit = true;
    document.getElementById('serverModalTitle').textContent = '서버 수정';
    document.getElementById('smId').value = ds.id;
    document.getElementById('smName').value = ds.name;
    document.getElementById('smHost').value = ds.host;
    document.getElementById('smPort').value = ds.port;
    document.getElementById('smSshUser').value = ds.sshuser;
    var paths = (ds.dumppath || '').split(/\r?\n/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
    setDumpPaths(paths);
    document.getElementById('smAutoDetect').checked = ds.autodetect === 'true';
    document.getElementById('serverModal').classList.add('open');
}

function submitServer() {
    var paths = collectDumpPaths();
    var data = {
        name: document.getElementById('smName').value.trim(),
        host: document.getElementById('smHost').value.trim(),
        port: parseInt(document.getElementById('smPort').value) || 22,
        sshUser: document.getElementById('smSshUser').value.trim() || 'sscuser',
        dumpPath: paths.join('\n'),
        autoDetect: document.getElementById('smAutoDetect').checked
    };
    if (!data.name || !data.host || paths.length === 0) {
        showToast('이름, 호스트, 덤프 경로(1개 이상)를 입력하세요.', 'error'); return;
    }
    var id = document.getElementById('smId').value;
    var url = _isEdit ? '/api/servers/' + id : '/api/servers';
    var method = _isEdit ? 'PUT' : 'POST';
    fetch(url, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.success) {
            showToast(_isEdit ? '서버가 수정되었습니다.' : '서버가 추가되었습니다.', 'success');
            setTimeout(function() { location.reload(); }, 500);
        } else {
            showToast(d.message || '저장 실패', 'error');
        }
    }).catch(function() { showToast('요청 실패', 'error'); });
    closeModal('serverModal');
}

function openDeleteModal(id, name) {
    document.getElementById('dmId').value = id;
    document.getElementById('dmName').textContent = name;
    document.getElementById('deleteModal').classList.add('open');
}

function submitDelete() {
    var id = document.getElementById('dmId').value;
    fetch('/api/servers/' + id, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.success) {
            showToast('서버가 삭제되었습니다.', 'success');
            setTimeout(function() { location.reload(); }, 500);
        } else { showToast(d.message || '삭제 실패', 'error'); }
    }).catch(function() { showToast('요청 실패', 'error'); });
    closeModal('deleteModal');
}

function testConn(id) {
    showToast('연결 테스트 중...', 'success');
    fetch('/api/servers/' + id + '/test', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.success) {
            showToast('연결 성공: ' + (d.hostname || ''), 'success');
            updateStatusBadge(id, 'OK');
        } else {
            showToast(d.message || '연결 실패', 'error');
            updateStatusBadge(id, 'FAIL', d.message);
        }
    }).catch(function() { showToast('요청 실패', 'error'); });
}

var _scanServerId = null;
function scanServer(id, name) {
    _scanServerId = id;
    document.getElementById('scanServerName').textContent = name;
    document.getElementById('scanResults').innerHTML = '<div style="padding:12px;color:#6B7280;text-align:center">스캔 중...</div>';
    document.getElementById('scanPanel').classList.add('open');

    fetch('/api/servers/' + id + '/scan', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        var html = '';
        // 일부 경로 실패 — pathErrors 배너 (전체 성공이 아닐 때)
        if (d.pathErrors && d.pathErrors.length > 0 && !d.error) {
            html += '<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#92400E;line-height:1.5">'
                  + '<strong style="display:block;margin-bottom:6px">일부 경로 스캔 실패 (' + d.pathErrors.length + '개)</strong>';
            for (var pi = 0; pi < d.pathErrors.length; pi++) {
                var pe = d.pathErrors[pi];
                html += '<div style="margin-bottom:2px"><code style="font-family:monospace">' + escHtml(pe.dumpPath) + '</code> — ' + escHtml(pe.error || '') + '</div>';
            }
            html += '</div>';
        }
        // 에러 배너 — errorCode 별로 시각 분리
        if (d.error) {
            var code = d.errorCode || 'SSH_ERROR';
            var isPathIssue = (code === 'DUMP_PATH_NOT_FOUND' || code === 'DUMP_PATH_NOT_READABLE');
            var title, bg, border, color;
            if (code === 'DUMP_PATH_NOT_FOUND') {
                title = '덤프 경로 없음';
                bg = '#FFFBEB'; border = '#FDE68A'; color = '#92400E';
            } else if (code === 'DUMP_PATH_NOT_READABLE') {
                title = '덤프 경로 권한 없음';
                bg = '#FFFBEB'; border = '#FDE68A'; color = '#92400E';
            } else {
                title = 'SSH/SCP Error';
                bg = '#FEF2F2'; border = '#FECACA'; color = '#991B1B';
            }
            html += '<div style="background:' + bg + ';border:1px solid ' + border + ';border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:' + color + ';line-height:1.5">'
                  + '<strong style="display:block;margin-bottom:4px">[' + escHtml(code) + '] ' + escHtml(title) + '</strong>'
                  + escHtml(d.error)
                  + (isPathIssue ? '<div style="margin-top:6px;font-size:11px;opacity:.85">서버 상세에서 dump path 또는 SSH 계정 권한을 확인해 주세요.</div>' : '')
                  + '</div>';
            updateStatusBadge(id, 'FAIL', d.error);
        } else {
            updateStatusBadge(id, 'OK');
        }
        if (d.files && d.files.length > 0) {
            html += renderScanResultsHtml(d.files);
        } else if (!d.error) {
            html += '<div style="padding:12px;color:#9CA3AF;text-align:center">덤프 파일이 없습니다.</div>';
        }
        document.getElementById('scanResults').innerHTML = html;
        // 미전송 파일 2개 이상이면 "모두 전송" 버튼 표시
        var untransferred = (d.files || []).filter(function(f) { return !f.transferred; });
        var btnAll = document.getElementById('btnTransferAll');
        if (btnAll) btnAll.style.display = untransferred.length >= 2 ? '' : 'none';
        if (!d.success && !d.error) {
            document.getElementById('scanResults').innerHTML =
                '<div style="padding:12px;color:#EF4444;text-align:center">' + escHtml(d.message || '스캔 실패') + '</div>';
        }
    }).catch(function() {
        document.getElementById('scanResults').innerHTML =
            '<div style="padding:12px;color:#EF4444;text-align:center">요청 실패</div>';
    });
}

function renderScanResultsHtml(files) {
    // 다중 경로 환경에서는 source 경로별로 그룹화. sourceDumpPath 미존재(레거시)면 단일 그룹.
    var groups = {};
    var order = [];
    for (var i = 0; i < files.length; i++) {
        var key = files[i].sourceDumpPath || '';
        if (!(key in groups)) { groups[key] = []; order.push(key); }
        groups[key].push(files[i]);
    }
    var multi = order.length > 1 || (order.length === 1 && order[0] !== '');
    var html = '';
    for (var g = 0; g < order.length; g++) {
        var key = order[g];
        if (multi && key) {
            html += '<div style="font-size:11px;color:#6B7280;font-weight:600;margin:8px 0 4px;padding:4px 8px;background:#F9FAFB;border-radius:4px;font-family:monospace">' + escHtml(key) + '</div>';
        }
        var arr = groups[key];
        for (var i = 0; i < arr.length; i++) {
            var f = arr[i];
            html += '<div class="scan-file">';
            html += '<span style="flex:1;font-weight:500">' + escHtml(f.filename) + '</span>';
            html += '<span style="color:#6B7280;font-size:12px">' + escHtml(f.formattedSize) + '</span>';
            if (f.transferred && f.analyzed) {
                html += '<span style="font-size:11px;color:#059669;font-weight:600">전송됨(분석완료)</span>';
            } else if (f.transferred) {
                html += '<span class="scan-transferred" style="font-size:11px">전송됨</span>';
            } else {
                html += '<button class="btn-transfer" data-path="' + escAttr(f.path) + '" onclick="transferFile(this)">전송</button>';
            }
            html += '</div>';
        }
    }
    return html;
}

function fmtMB(bytes) {
    if (bytes == null || bytes < 0) return '–';
    var mb = bytes / (1024 * 1024);
    if (mb >= 1024) return (mb / 1024).toFixed(2) + ' GB';
    return mb.toFixed(1) + ' MB';
}

function transferFile(btn, callback) {
    var path = btn.getAttribute('data-path');
    var parent = btn.parentNode;

    // 버튼을 진행바로 교체
    btn.style.display = 'none';
    var prevErr = parent.querySelector('.transfer-err');
    if (prevErr) prevErr.remove();
    var prog = document.createElement('div');
    prog.className = 'transfer-progress';
    prog.innerHTML = '<div class="transfer-bar"><div class="transfer-bar-fill indeterminate"></div></div>'
                   + '<span class="transfer-label">전송 시작 중...</span>';
    parent.appendChild(prog);
    var fill = prog.querySelector('.transfer-bar-fill');
    var label = prog.querySelector('.transfer-label');

    var url = '/api/servers/' + _scanServerId + '/transfer/stream?remotePath=' + encodeURIComponent(path);
    var es;
    try { es = new EventSource(url); }
    catch (e) {
        fill.className = 'transfer-bar-fill fail';
        label.textContent = '연결 실패';
        btn.style.display = ''; btn.disabled = false; btn.textContent = '재시도';
        showToast('전송 스트림 열기 실패', 'error');
        if (callback) callback();
        return;
    }

    var doneReceived = false;

    es.addEventListener('progress', function(ev) {
        try {
            var d = JSON.parse(ev.data);
            var bytes = (d.bytes != null) ? d.bytes : 0;
            var total = (d.total != null) ? d.total : -1;
            if (total > 0) {
                fill.classList.remove('indeterminate');
                var pct = Math.max(0, Math.min(100, (bytes / total) * 100));
                fill.style.width = pct.toFixed(1) + '%';
                label.textContent = fmtMB(bytes) + ' / ' + fmtMB(total)
                                  + ' (' + pct.toFixed(1) + '%)';
            } else {
                // 총량 미상 — indeterminate 유지하고 받은 양만 표시
                label.textContent = fmtMB(bytes) + ' 전송 중...';
            }
        } catch (e) {}
    });

    es.addEventListener('done', function(ev) {
        doneReceived = true;
        es.close();
        var d = {};
        try { d = JSON.parse(ev.data); } catch (e) {}
        if (d.success) {
            fill.classList.remove('indeterminate');
            fill.className = 'transfer-bar-fill done';
            fill.style.width = '100%';
            var sizeStr = d.fileSize ? ' (' + fmtMB(d.fileSize) + ')' : '';
            label.textContent = '완료' + sizeStr;
            label.style.color = '#059669';
            showToast((d.filename || '파일') + ' 전송 완료', 'success');
        } else {
            fill.classList.remove('indeterminate');
            fill.className = 'transfer-bar-fill fail';
            label.textContent = '실패';
            label.style.color = '#EF4444';
            var errEl = document.createElement('div');
            errEl.className = 'transfer-err';
            errEl.style.cssText = 'font-size:11px;color:#DC2626;margin-top:4px;max-width:300px;word-break:break-all';
            errEl.textContent = d.message || '전송 실패';
            parent.appendChild(errEl);
            btn.style.display = '';
            btn.disabled = false;
            btn.textContent = '재시도';
            showToast('SCP Transfer Failed: ' + (d.message || ''), 'error');
        }
        if (callback) callback();
    });

    es.onerror = function() {
        if (doneReceived) return; // 정상 종료 후 재연결 차단을 위한 onerror — 무시
        es.close();
        fill.classList.remove('indeterminate');
        fill.className = 'transfer-bar-fill fail';
        label.textContent = '연결 오류';
        label.style.color = '#EF4444';
        btn.style.display = '';
        btn.disabled = false;
        btn.textContent = '재시도';
        showToast('전송 스트림 오류', 'error');
        if (callback) callback();
    };
}

function transferAll() {
    var btns = document.querySelectorAll('#scanResults .btn-transfer:not(:disabled)');
    if (btns.length === 0) { showToast('전송할 파일이 없습니다.', 'error'); return; }
    var allBtn = document.getElementById('btnTransferAll');
    if (allBtn) { allBtn.disabled = true; allBtn.textContent = '전송 중...'; }
    // 순차 전송
    var queue = Array.prototype.slice.call(btns);
    function next() {
        if (queue.length === 0) {
            if (allBtn) { allBtn.textContent = '완료'; allBtn.style.background = '#059669'; allBtn.style.borderColor = '#059669'; }
            return;
        }
        var btn = queue.shift();
        transferFile(btn, next);
    }
    next();
}

function closeScanPanel() {
    document.getElementById('scanPanel').classList.remove('open');
}

function updateStatusBadge(serverId, status, errMsg) {
    var row = document.querySelector('tr[data-id="' + serverId + '"]');
    if (!row) return;
    // data-status 동기화 (필터 일관성 유지)
    if (row.getAttribute('data-enabled') === 'true') {
        row.setAttribute('data-status', status);
    }
    // 상태 컬럼은 5번째 td (0-indexed: 4)
    var cells = row.querySelectorAll('td');
    if (cells.length < 5) return;
    var td = cells[4];
    if (status === 'OK') {
        td.innerHTML = '<span class="badge badge-on">정상</span>';
    } else if (status === 'FAIL') {
        var span = document.createElement('span');
        span.className = 'badge badge-fail';
        span.textContent = '실패';
        if (errMsg) span.title = errMsg;
        td.innerHTML = '';
        td.appendChild(span);
    }
}

// escHtml → Common.escHtml (common.js). 기존 textContent 버전은 `"` `'` 미처리 → Common 은 5 문자 escape 로 강화.
var escHtml = Common.escHtml;
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

// ── Auto-scan errors ──────────────────────────────────
function loadScanErrors() {
    fetch('/api/servers/scan-errors').then(function(r) { return r.json(); }).then(function(d) {
        var panel = document.getElementById('scanErrorsPanel');
        var errors = d.errors || {};
        var keys = Object.keys(errors);
        if (keys.length === 0) { panel.style.display = 'none'; return; }
        var html = '';
        for (var i = 0; i < keys.length; i++) {
            var sid = keys[i];
            var msg = errors[sid];
            // 서버 이름 찾기 — 테이블에서 data-id로 조회
            var row = document.querySelector('tr[data-id="' + sid + '"]');
            var sname = row ? row.querySelector('td').textContent : 'Server #' + sid;
            html += '<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#991B1B;line-height:1.5">'
                  + '<strong>' + escHtml(sname) + '</strong> — ' + escHtml(msg) + '</div>';
        }
        panel.innerHTML = html;
        panel.style.display = 'block';
    }).catch(function() {});
}

// 30초마다 에러 상태 갱신
loadScanErrors();
setInterval(loadScanErrors, 30000);

// ── Data grid: search / filter / sort / pagination ─────────────
var _allRows = [];
var _filteredRows = [];
var _pageSize = 20;
var _currentPage = 1;
var _sortKey = 'name';
var _sortDir = 'asc';
var _sortType = 'str';

function initRows() {
    var tbody = document.getElementById('serverTableBody');
    if (!tbody) return;   // 서버 0건 — 데이터 그리드 미렌더
    _allRows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
    var saved = parseInt(localStorage.getItem('serversPageSize') || '20', 10);
    if ([20, 30, 50, 100].indexOf(saved) !== -1) {
        _pageSize = saved;
        document.getElementById('pageSizeSelect').value = String(saved);
    }
    sortRows();
    updateSortIndicators();
    applyFilter();
}

function onHeaderSort(th) {
    var key = th.getAttribute('data-sort-key');
    var type = th.getAttribute('data-sort-type') || 'str';
    if (_sortKey === key) {
        _sortDir = (_sortDir === 'asc') ? 'desc' : 'asc';
    } else {
        _sortKey = key;
        _sortType = type;
        _sortDir = 'asc';
    }
    _sortType = type;
    sortRows();
    updateSortIndicators();
    applyFilter();
}

function sortRows() {
    var dir = _sortDir === 'asc' ? 1 : -1;
    var isNum = _sortType === 'num';
    _allRows.sort(function(a, b) {
        var va = a.getAttribute('data-' + _sortKey) || '';
        var vb = b.getAttribute('data-' + _sortKey) || '';
        if (isNum) { va = parseFloat(va) || 0; vb = parseFloat(vb) || 0; return (va - vb) * dir; }
        return va.localeCompare(vb, 'ko') * dir;
    });
    var tbody = document.getElementById('serverTableBody');
    if (tbody) _allRows.forEach(function(r) { tbody.appendChild(r); });
}

function updateSortIndicators() {
    document.querySelectorAll('.stable th.sortable').forEach(function(th) {
        var arrow = th.querySelector('.sort-arrow');
        if (!arrow) return;
        if (th.getAttribute('data-sort-key') === _sortKey) {
            th.classList.add('sort-active');
            arrow.textContent = (_sortDir === 'asc') ? '▲' : '▼';
        } else {
            th.classList.remove('sort-active');
            arrow.textContent = '▲';
        }
    });
}

function applyFilter() {
    var q = (document.getElementById('searchInput').value || '').toLowerCase();
    var statusF = document.getElementById('statusFilter').value;
    var autoF = document.getElementById('autoDetectFilter').value;
    _filteredRows = _allRows.filter(function(el) {
        if (statusF !== 'all' && el.getAttribute('data-status') !== statusF) return false;
        if (autoF !== 'all') {
            var on = el.getAttribute('data-autodetect') === 'true';
            if (autoF === 'on' && !on) return false;
            if (autoF === 'off' && on) return false;
        }
        if (q) {
            var hay = ((el.getAttribute('data-name') || '') + ' ' +
                       (el.getAttribute('data-host') || '') + ' ' +
                       (el.getAttribute('data-sshuser') || '') + ' ' +
                       (el.getAttribute('data-dumppath') || '')).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
        }
        return true;
    });
    _currentPage = 1;
    render();
}

function onSearchInput() { applyFilter(); }

function onPageSizeChange() {
    _pageSize = parseInt(document.getElementById('pageSizeSelect').value, 10) || 20;
    localStorage.setItem('serversPageSize', String(_pageSize));
    _currentPage = 1;
    render();
}

function gotoPage(p) {
    var total = _filteredRows.length;
    var totalPages = Math.max(1, Math.ceil(total / _pageSize));
    if (p < 1) p = 1; if (p > totalPages) p = totalPages;
    _currentPage = p;
    render();
}

function render() {
    _allRows.forEach(function(el) { el.style.display = 'none'; });
    var total = _filteredRows.length;
    var totalPages = Math.max(1, Math.ceil(total / _pageSize));
    if (_currentPage > totalPages) _currentPage = totalPages;
    var start = (_currentPage - 1) * _pageSize;
    var end = Math.min(start + _pageSize, total);
    for (var i = start; i < end; i++) _filteredRows[i].style.display = '';

    var noMatch = document.getElementById('noMatch');
    if (noMatch) noMatch.style.display = total === 0 ? 'block' : 'none';
    renderPagination(total, totalPages, start, end);
}

function renderPagination(total, totalPages, start, end) {
    var bar = document.getElementById('paginationBar');
    if (!bar) return;
    if (total <= _pageSize) { bar.classList.remove('show'); return; }
    bar.classList.add('show');
    document.getElementById('pgInfo').innerHTML =
        '<strong>' + (total === 0 ? 0 : (start + 1)) + '–' + end + '</strong> / 전체 <strong>' + total + '</strong>건';

    var list = document.getElementById('pgList');
    list.innerHTML = '';
    var addBtn = function(label, page, opts) {
        opts = opts || {};
        var b = document.createElement('button');
        b.className = 'pg-btn' + (opts.active ? ' active' : '');
        b.textContent = label;
        if (opts.disabled) b.disabled = true;
        else b.onclick = function() { gotoPage(page); };
        list.appendChild(b);
    };
    var addEllipsis = function() {
        var s = document.createElement('span');
        s.className = 'pg-ellipsis'; s.textContent = '…';
        list.appendChild(s);
    };

    addBtn('‹', _currentPage - 1, { disabled: _currentPage === 1 });

    var pages = new Set([1, totalPages, _currentPage]);
    for (var d = 1; d <= 2; d++) {
        if (_currentPage - d >= 1) pages.add(_currentPage - d);
        if (_currentPage + d <= totalPages) pages.add(_currentPage + d);
    }
    var sorted = Array.from(pages).sort(function(a, b) { return a - b; });
    var prev = 0;
    sorted.forEach(function(p) {
        if (p - prev > 1) addEllipsis();
        addBtn(String(p), p, { active: p === _currentPage });
        prev = p;
    });

    addBtn('›', _currentPage + 1, { disabled: _currentPage === totalPages });
}

initRows();
</script>

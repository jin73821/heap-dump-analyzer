<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/common.css?v=2026-06-28">
    <title>Login — Heap Dump Analyzer</title>
    <style>
        body { display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px 36px;
                      width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
                      justify-content: center; }
        .login-logo-icon { width: 40px; height: 40px; background: #2563EB; border-radius: 10px;
                           display: flex; align-items: center; justify-content: center; }
        .login-logo-icon svg { width: 22px; height: 22px; }
        .login-logo-text { font-size: 18px; font-weight: 700; }
        .login-sub { text-align: center; font-size: 13px; color: #6B7280; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: #374151;
                      margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 14px; border: 1px solid #E5E7EB;
                      border-radius: 8px; font-size: 14px; outline: none; background: #F9FAFB; }
        .form-input:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1);
                            background: #fff; }
        .login-btn { width: 100%; padding: 11px; border: none; border-radius: 8px;
                     background: #2563EB; color: #fff; font-size: 14px; font-weight: 600;
                     cursor: pointer; margin-top: 8px; position: relative; transition: background .15s; }
        .login-btn:hover { background: #1D4ED8; }
        .login-btn.loading { pointer-events: none; color: transparent; cursor: wait; }
        .login-btn.loading::after {
            content: ''; position: absolute; left: 50%; top: 50%;
            width: 18px; height: 18px; margin: -9px 0 0 -9px;
            border: 2.5px solid rgba(255,255,255,.35); border-top-color: #fff;
            border-radius: 50%; animation: loginSpin .65s linear infinite;
        }
        @keyframes loginSpin { to { transform: rotate(360deg); } }
        .msg-error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626;
                     padding: 10px 14px; border-radius: 8px; font-size: 13px;
                     margin-bottom: 16px; text-align: center; }
        .msg-disabled { background: #FFF7ED; border: 1px solid #FED7AA; color: #C2410C;
                        padding: 10px 14px; border-radius: 8px; font-size: 13px;
                        margin-bottom: 16px; text-align: center; }
        .msg-info { background: #EFF6FF; border: 1px solid #BFDBFE; color: #2563EB;
                    padding: 10px 14px; border-radius: 8px; font-size: 13px;
                    margin-bottom: 16px; text-align: center; }
        .form-remember { display: flex; align-items: center; gap: 8px; margin: 4px 0 4px;
                         font-size: 13px; color: #374151; cursor: pointer;
                         user-select: none; }
        .form-remember input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer;
                                                 accent-color: #2563EB; margin: 0; }

        /* Signup link below login button */
        .signup-row { text-align: center; font-size: 12px; color: #6B7280; margin-top: 14px; }
        .signup-link { background: transparent; border: none; color: #2563EB; font-size: 12px;
                       font-weight: 600; cursor: pointer; padding: 0; text-decoration: underline; }
        .signup-link:hover { color: #1D4ED8; }

        /* Modal — .modal-ov / @keyframes modalIn / .modal-box base 는 common.css 에서 제공.
           border-radius 14px 변형 + width/max-height/overflow-y 는 인라인 유지. */
        .modal-ov.open { animation: modalFade .15s ease; }
        @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
        .modal-box { border-radius: 14px;
                     width: calc(100% - 32px); max-width: 440px;
                     animation: modalIn .2s ease;
                     max-height: calc(100vh - 32px); overflow-y: auto; }
        .modal-ttl { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .modal-desc { font-size: 12px; color: #6B7280; margin-bottom: 16px; }
        .modal-group { margin-bottom: 12px; }
        .modal-label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
        .modal-input { width: 100%; padding: 9px 12px; border: 1px solid #E5E7EB;
                       border-radius: 8px; font-size: 13px; outline: none; background: #F9FAFB; }
        .modal-input:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1); background: #fff; }
        .modal-textarea { width: 100%; padding: 9px 12px; border: 1px solid #E5E7EB;
                          border-radius: 8px; font-size: 13px; outline: none; background: #F9FAFB;
                          resize: vertical; min-height: 70px; font-family: inherit; }
        .modal-textarea:focus { border-color: #93C5FD; box-shadow: 0 0 0 3px rgba(37,99,235,.1); background: #fff; }
        .modal-hint { font-size: 11px; color: #9CA3AF; margin-top: 4px; }
        .modal-msg { font-size: 12px; padding: 8px 10px; border-radius: 7px; margin-bottom: 12px; display: none; }
        .modal-msg.show { display: block; }
        .modal-msg.error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; }
        .modal-msg.success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #166534; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
        .modal-btns button { padding: 9px 16px; border-radius: 7px; font-size: 13px; border: none;
                             cursor: pointer; font-weight: 600; }
        /* .mbtn-cancel / .mbtn-save 색상은 common.css 에서 제공 */
        .mbtn-save:disabled { background: #93C5FD; cursor: wait; }

        @media (max-width: 480px) {
            .modal-box { padding: 18px; border-radius: 12px; }
            .modal-btns { gap: 6px; }
            .modal-btns button { flex: 1; }
        }

        /* ── Mobile ──────────────────────────────── */
        @media (max-width: 480px) {
            body { padding: 24px; align-items: flex-start; padding-top: 60px; }
            .login-card { padding: 24px 18px; border-radius: 12px; max-width: 320px;
                          box-shadow: 0 2px 12px rgba(0,0,0,.06); margin: 0 auto; }
            .login-logo { gap: 8px; margin-bottom: 18px; }
            .login-logo-icon { width: 30px; height: 30px; border-radius: 7px; }
            .login-logo-icon svg { width: 17px; height: 17px; }
            .login-logo-text { font-size: 15px; }
            .login-sub { font-size: 11px; margin-bottom: 16px; }
            .form-label { font-size: 11px; }
            .form-input { padding: 9px 11px; font-size: 15px; }
            .login-btn { padding: 11px; font-size: 14px; }
            .msg-error, .msg-info { font-size: 11px; padding: 8px 10px; }
            .form-remember { font-size: 12px; }
        }

        /* ── Desktop large ───────────────────────── */
        @media (min-width: 1024px) {
            .login-card { padding: 48px 44px; max-width: 420px; }
            .login-logo-text { font-size: 20px; }
            .login-sub { font-size: 14px; }
            .form-input { padding: 12px 16px; font-size: 15px; }
            .login-btn { padding: 13px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <div class="login-logo-icon">
            <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="6.5" stroke="rgba(255,255,255,.35)" stroke-width="3.5"/><circle cx="10" cy="10" r="6.5" stroke="#fff" stroke-width="3.5" stroke-dasharray="27.5 40.8" stroke-dashoffset="10.2" stroke-linecap="round"/><circle cx="10" cy="10" r="1.5" fill="#fff" opacity=".8"/></svg>
        </div>
        <span class="login-logo-text">Heap Dump Analyzer</span>
    </div>
    <div class="login-sub">시스템에 접속하려면 로그인하세요</div>

    <div th:if="${disabledMessage}" class="msg-disabled" th:text="${disabledMessage}"></div>
    <div th:if="${errorMessage}" class="msg-error" th:text="${errorMessage}"></div>
    <div th:if="${logoutMessage}" class="msg-info" th:text="${logoutMessage}"></div>
    <div th:if="${expiredMessage}" class="msg-disabled" th:text="${expiredMessage}"></div>

    <form th:action="@{/login}" method="post" id="loginForm">
        <div class="form-group">
            <label class="form-label" for="username">사용자명(사번)</label>
            <input class="form-input" type="text" id="username" name="username"
                   placeholder="Username" autocomplete="username" autofocus required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">비밀번호</label>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Password" autocomplete="current-password" required>
        </div>
        <label class="form-remember">
            <input type="checkbox" id="rememberUsername">
            <span>사용자명(사번) 저장</span>
        </label>
        <button class="login-btn" type="submit">로그인</button>
    </form>
    <div class="signup-row">
        계정이 없으신가요?
        <button type="button" class="signup-link" onclick="openSignupModal()">계정 신청</button>
    </div>
</div>

<div class="modal-ov" id="signupModal">
    <div class="modal-box">
        <div class="modal-ttl">계정 신청</div>
        <div class="modal-desc">관리자 승인 후 로그인하실 수 있습니다.</div>

        <div class="modal-msg" id="signupMsg"></div>

        <div class="modal-group">
            <label class="modal-label" for="suUsername">사용자명(사번) *</label>
            <input class="modal-input" id="suUsername" autocomplete="off" maxlength="50" placeholder="영문/숫자 3~50자">
            <div class="modal-hint">로그인 시 사용할 ID (사번)</div>
        </div>
        <div class="modal-group">
            <label class="modal-label" for="suPassword">비밀번호 *</label>
            <input class="modal-input" id="suPassword" type="password" autocomplete="new-password" maxlength="100" placeholder="비밀번호">
            <div class="modal-hint">8자 이상, 영문·숫자·특수문자 포함</div>
        </div>
        <div class="modal-group">
            <label class="modal-label" for="suPasswordConfirm">비밀번호 확인 *</label>
            <input class="modal-input" id="suPasswordConfirm" type="password" autocomplete="new-password" maxlength="100" placeholder="비밀번호 다시 입력">
        </div>
        <div class="modal-group">
            <label class="modal-label" for="suDisplayName">이름</label>
            <input class="modal-input" id="suDisplayName" autocomplete="name" maxlength="100" placeholder="표시 이름 (선택)">
        </div>
        <div class="modal-group">
            <label class="modal-label" for="suReason">신청 사유</label>
            <textarea class="modal-textarea" id="suReason" maxlength="500" placeholder="간단히 입력해주세요 (선택)"></textarea>
        </div>

        <div class="modal-btns">
            <button class="mbtn-cancel" type="button" onclick="closeSignupModal()">취소</button>
            <button class="mbtn-save" type="button" id="suSubmitBtn" onclick="submitSignup()">신청</button>
        </div>
    </div>
</div>

<script>
(function () {
    try {
        if (window.history && window.history.replaceState
                && (location.search.indexOf('error') >= 0 || location.search.indexOf('logout') >= 0 || location.search.indexOf('expired') >= 0)) {
            window.history.replaceState({}, document.title, location.pathname);
        }
    } catch (e) { /* 구형 브라우저 무시 */ }
})();

(function () {
    var STORAGE_KEY = 'heap_login_username';
    var usernameEl = document.getElementById('username');
    var passwordEl = document.getElementById('password');
    var rememberEl = document.getElementById('rememberUsername');
    var formEl = document.getElementById('loginForm');
    if (!usernameEl || !rememberEl || !formEl) return;

    try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            usernameEl.value = saved;
            rememberEl.checked = true;
            if (passwordEl) {
                usernameEl.blur();
                passwordEl.focus();
            }
        }
    } catch (e) { /* localStorage 비활성/차단 환경 무시 */ }

    formEl.addEventListener('submit', function () {
        try {
            if (rememberEl.checked) {
                localStorage.setItem(STORAGE_KEY, usernameEl.value.trim());
            } else {
                localStorage.removeItem(STORAGE_KEY);
            }
        } catch (e) { /* 저장 실패해도 로그인은 진행 */ }

        var btn = formEl.querySelector('button[type="submit"]');
        if (btn) btn.classList.add('loading');
    });
})();

function openSignupModal() {
    document.getElementById('suUsername').value = '';
    document.getElementById('suPassword').value = '';
    document.getElementById('suPasswordConfirm').value = '';
    document.getElementById('suDisplayName').value = '';
    document.getElementById('suReason').value = '';
    var msg = document.getElementById('signupMsg');
    msg.className = 'modal-msg'; msg.textContent = '';
    document.getElementById('suSubmitBtn').disabled = false;
    document.getElementById('suSubmitBtn').textContent = '신청';
    document.getElementById('signupModal').classList.add('open');
    setTimeout(function() { document.getElementById('suUsername').focus(); }, 50);
}
function closeSignupModal() {
    document.getElementById('signupModal').classList.remove('open');
}
function showSignupMsg(text, type) {
    var el = document.getElementById('signupMsg');
    el.textContent = text;
    el.className = 'modal-msg show ' + (type || 'error');
}
function submitSignup() {
    var btn = document.getElementById('suSubmitBtn');
    var username = (document.getElementById('suUsername').value || '').trim();
    var password = document.getElementById('suPassword').value || '';
    var passwordConfirm = document.getElementById('suPasswordConfirm').value || '';
    var displayName = (document.getElementById('suDisplayName').value || '').trim();
    var reason = (document.getElementById('suReason').value || '').trim();

    if (!username) { showSignupMsg('사용자명(사번)을 입력하세요.', 'error'); return; }
    if (!password) { showSignupMsg('비밀번호를 입력하세요.', 'error'); return; }
    if (password !== passwordConfirm) { showSignupMsg('비밀번호 확인이 일치하지 않습니다.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = '신청 중…';
    fetch('/api/account-requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: username,
            password: password,
            displayName: displayName,
            reason: reason
        })
    }).then(function(r) {
        return r.json().then(function(d) { return { ok: r.ok, body: d }; });
    }).then(function(res) {
        if (res.ok && res.body && res.body.success) {
            showSignupMsg('신청이 접수되었습니다. 관리자 승인 후 로그인하실 수 있습니다.', 'success');
            btn.textContent = '신청 완료';
            setTimeout(closeSignupModal, 2200);
        } else {
            btn.disabled = false;
            btn.textContent = '신청';
            showSignupMsg((res.body && res.body.message) || '신청 처리에 실패했습니다.', 'error');
        }
    }).catch(function() {
        btn.disabled = false;
        btn.textContent = '신청';
        showSignupMsg('네트워크 오류가 발생했습니다. 잠시 후 다시 시도하세요.', 'error');
    });
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        var m = document.getElementById('signupModal');
        if (m && m.classList.contains('open')) closeSignupModal();
    }
});
</script>

</body>
</html>

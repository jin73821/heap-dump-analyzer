<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>코어 덤프 분석 - Heap Dump Analyzer</title>
    <link rel="stylesheet" th:href="@{/css/common.css?v=2026-06-05}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/core-dump.css?v=2026-06-19}">
    <style>
        body { background: #F3F4F6 !important; }

        /* index.html 전용 콘텐츠 카드 크기 override */
        .content-card { margin-bottom: 24px; }
        .content-card-title { font-size: 15px; color: #1F2937; margin-bottom: 20px; padding-bottom: 12px; }

        /* 업로드 영역 */
        .upload-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px;
        }
        @media (max-width: 600px) { .upload-grid { grid-template-columns: 1fr; } }

        .upload-zone-label {
            display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
            font-size: 13px; font-weight: 600; color: #374151;
        }
        .required-badge {
            background: #FEE2E2; color: #DC2626; border-radius: 6px;
            padding: 2px 8px; font-size: 11px; font-weight: 700;
        }
        .optional-badge {
            background: #F3F4F6; color: #6B7280; border-radius: 6px;
            padding: 2px 8px; font-size: 11px; font-weight: 600;
        }

        .upload-zone {
            border: 2px dashed #D1D5DB; border-radius: 12px;
            padding: 24px 16px; text-align: center; cursor: pointer;
            transition: all .2s; background: #FAFAFA; position: relative;
            min-height: 110px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 4px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #3B82F6; background: #EFF6FF;
        }
        .upload-zone.has-file {
            border-color: #10B981; background: #F0FDF4; border-style: solid;
        }
        .upload-zone input[type=file] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }
        .upload-zone-icon { font-size: 28px; }
        .upload-zone-text { font-size: 13px; font-weight: 600; color: #374151; }
        .upload-zone-sub  { font-size: 11px; color: #9CA3AF; }
        .upload-zone-file {
            font-size: 12px; color: #059669; font-weight: 700;
            word-break: break-all; margin-top: 4px;
        }

        /* 업로드 제출 버튼 */
        .upload-submit-btn {
            width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
            background: #2563EB; color: #fff; border: none; border-radius: 10px;
            cursor: pointer; transition: all .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .upload-submit-btn:hover:not(:disabled) { background: #1D4ED8; box-shadow: 0 4px 14px rgba(37,99,235,.3); }
        .upload-submit-btn:disabled { background: #9CA3AF; cursor: not-allowed; }

        /* 업로드 진행 */
        .upload-progress-bar {
            display: none; margin-top: 12px; background: #E5E7EB;
            border-radius: 999px; height: 6px; overflow: hidden;
        }
        .upload-progress-bar.visible { display: block; }
        .upload-progress-fill {
            height: 100%; background: linear-gradient(90deg, #3B82F6, #6366F1);
            border-radius: 999px; transition: width .3s ease; width: 0%;
        }
        .upload-status { font-size: 12px; color: #6B7280; margin-top: 8px; text-align: center; }
        .upload-error-box {
            display: none; margin-top: 12px;
            background: #FEF2F2; border: 1px solid #FECACA; border-left: 4px solid #DC2626;
            border-radius: 10px; padding: 14px 16px;
        }
        .upload-error-box.visible { display: block; }
        .upload-error-title { font-size: 13px; font-weight: 700; color: #991B1B; margin-bottom: 4px; }
        .upload-error-msg   { font-size: 12px; color: #7F1D1D; }

        /* 이력 항목 카드 */
        @keyframes pulse-border {
            0%, 100% { border-color: #93C5FD; }
            50%       { border-color: #3B82F6; }
        }

        .hi-list { display: flex; flex-direction: column; gap: 8px; }

        .hi-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px; border-radius: 12px;
            border: 1.5px solid #E5E7EB; background: #FAFAFA;
            transition: border-color .15s, box-shadow .15s, background .15s;
        }
        .hi-item:hover { background: #F3F4F6; border-color: #D1D5DB; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .hi-item.hi-success { border-color: #A7F3D0; background: #F0FDF4; }
        .hi-item.hi-success:hover { border-color: #34D399; box-shadow: 0 2px 8px rgba(16,185,129,.12); }
        .hi-item.hi-error   { border-color: #FECACA; background: #FFF8F8; }
        .hi-item.hi-error:hover   { border-color: #F87171; box-shadow: 0 2px 8px rgba(239,68,68,.12); }
        .hi-item.hi-analyzing {
            border-color: #93C5FD; background: #EFF6FF;
            animation: pulse-border 1.8s ease infinite;
        }

        .hi-num {
            font-size: 12px; font-weight: 700; color: #CBD5E1;
            min-width: 22px; text-align: right; flex-shrink: 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .hi-body { flex: 1 1 0; min-width: 0; }
        .hi-filename {
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
            font-weight: 700; color: #1F2937; word-break: break-all;
            margin-bottom: 5px;
        }
        .hi-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .hi-time { font-size: 11px; color: #9CA3AF; white-space: nowrap; }
        .hi-time-sep { font-size: 11px; color: #D1D5DB; }

        .hi-status-col {
            display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
            flex-shrink: 0; min-width: 70px;
        }
        .hi-analyzed-time { font-size: 10px; color: #9CA3AF; white-space: nowrap; }

        .hi-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; align-items: center; }

        /* 빈 상태 */
        .empty-state { text-align: center; padding: 48px 20px; color: #9CA3AF; }
        .empty-state-icon { font-size: 44px; margin-bottom: 12px; }
        .empty-state-text { font-size: 14px; }

        @media (max-width: 640px) {
            .hi-item { flex-wrap: wrap; gap: 10px; }
            .hi-status-col { align-items: flex-start; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/banner :: banner}"></div>

<div class="cd-topbar">
    <span class="topbar-title">코어 덤프 분석</span>
</div>

<div class="cd-page">

    <!-- 업로드 카드 -->
    <div class="content-card">
        <div class="content-card-title">
            &#128229; 코어 덤프 파일 업로드
        </div>

        <div class="upload-grid">
            <!-- 코어 덤프 파일 -->
            <div>
                <div class="upload-zone-label">
                    코어 덤프 파일 <span class="required-badge">필수</span>
                </div>
                <div class="upload-zone" id="coreDropZone">
                    <input type="file" id="coreFileInput" onchange="onCoreFileSelect(this)">
                    <div class="upload-zone-icon">&#128196;</div>
                    <div class="upload-zone-text">파일 선택 또는 드래그</div>
                    <div class="upload-zone-sub">core, core.PID, core.PROG 등</div>
                    <div class="upload-zone-file" id="coreFileName"></div>
                </div>
            </div>
            <!-- 실행 파일 -->
            <div>
                <div class="upload-zone-label">
                    실행 파일 <span class="optional-badge">선택</span>
                </div>
                <div class="upload-zone" id="execDropZone">
                    <input type="file" id="execFileInput" onchange="onExecFileSelect(this)">
                    <div class="upload-zone-icon">&#9881;</div>
                    <div class="upload-zone-text">파일 선택 또는 드래그</div>
                    <div class="upload-zone-sub">디버그 심볼 포함 시 더 정확한 분석</div>
                    <div class="upload-zone-file" id="execFileName"></div>
                </div>
            </div>
        </div>

        <button class="upload-submit-btn" id="uploadBtn" onclick="startUpload()" disabled>
            &#128269; GDB 분석 시작
        </button>
        <div class="upload-progress-bar" id="uploadProgress">
            <div class="upload-progress-fill" id="uploadProgressFill"></div>
        </div>
        <div class="upload-status" id="uploadStatus"></div>
        <div class="upload-error-box" id="uploadErrorBox">
            <div class="upload-error-title">&#10007; 업로드 실패</div>
            <div class="upload-error-msg" id="uploadErrorMsg"></div>
        </div>
    </div>

    <!-- 분석 이력 카드 -->
    <div class="content-card">
        <div class="content-card-title">
            &#128202; 분석 이력
            <span class="title-count" th:text="${#lists.size(history)} + '건'"></span>
        </div>

        <!-- 빈 상태 -->
        <div th:if="${#lists.isEmpty(history)}" class="empty-state">
            <div class="empty-state-icon">&#128203;</div>
            <div class="empty-state-text">분석 이력이 없습니다.<br>코어 덤프 파일을 업로드하여 분석을 시작하세요.</div>
        </div>

        <!-- 이력 목록 -->
        <div th:if="${!#lists.isEmpty(history)}" class="hi-list">
            <div th:each="item, stat : ${history}"
                 class="hi-item"
                 th:classappend="${item.status == 'SUCCESS'} ? ' hi-success'
                                : (${item.status == 'ERROR'} ? ' hi-error'
                                : (${item.status == 'ANALYZING'} ? ' hi-analyzing' : ''))">

                <!-- 번호 -->
                <div class="hi-num" th:text="${stat.count}"></div>

                <!-- 파일명 + 메타 -->
                <div class="hi-body">
                    <div class="hi-filename" th:text="${item.filename}"></div>
                    <div class="hi-meta-row">
                        <!-- 시그널 칩 -->
                        <span th:if="${item.crashSignal != null}"
                              class="signal-chip"
                              th:classappend="${item.crashSignal == 'SIGSEGV' or item.crashSignal == 'SIGBUS' or item.crashSignal == 'SIGILL'} ? ' chip-fatal'
                                             : (${item.crashSignal == 'SIGABRT' or item.crashSignal == 'SIGFPE'} ? ' chip-warn' : ' chip-neutral')"
                              th:text="${item.crashSignal}">
                        </span>
                        <!-- 업로드 시각 -->
                        <span class="hi-time" th:if="${item.createdAt != null}">
                            &#128337;
                            <span th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </span>
                    </div>
                </div>

                <!-- 상태 + 분석 시각 -->
                <div class="hi-status-col">
                    <span class="status-badge"
                          th:classappend="${item.status == 'SUCCESS'} ? 'status-success'
                                         : (${item.status == 'ERROR'} ? 'status-error'
                                         : (${item.status == 'ANALYZING'} ? 'status-analyzing' : 'status-not-analyzed'))"
                          th:text="${item.status == 'SUCCESS'} ? '완료'
                                   : (${item.status == 'ERROR'} ? '실패'
                                   : (${item.status == 'ANALYZING'} ? '분석 중' : '미분석'))">
                    </span>
                    <span class="hi-analyzed-time"
                          th:if="${item.analyzedAt != null}"
                          th:text="${#temporals.format(item.analyzedAt, 'MM-dd HH:mm')}"></span>
                </div>

                <!-- 액션 -->
                <div class="hi-actions">
                    <a th:if="${item.status == 'SUCCESS'}"
                       th:href="@{/core-dump/analyze/{fn}(fn=${item.filename})}"
                       class="action-btn action-view">결과 보기</a>
                    <a th:if="${item.status == 'ANALYZING'}"
                       th:href="@{/core-dump/progress/{fn}(fn=${item.filename})}"
                       class="action-btn action-progress">&#9654; 진행 확인</a>
                    <button th:if="${item.status == 'ERROR' or item.status == 'NOT_ANALYZED'}"
                            class="action-btn action-reanalyze"
                            th:data-filename="${item.filename}"
                            onclick="reanalyze(this.dataset.filename, this)">&#8635; 재분석</button>
                    <button class="action-btn action-delete"
                            th:data-filename="${item.filename}"
                            onclick="deleteDump(this.dataset.filename)">&#128465; 삭제</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    var _preloadedFilename = null;

    document.addEventListener('DOMContentLoaded', function() {
        var params = new URLSearchParams(window.location.search);
        var preFile = params.get('file');
        if (preFile) {
            _preloadedFilename = preFile;
            document.getElementById('coreFileName').textContent = preFile;
            document.getElementById('coreDropZone').classList.add('has-file');
            document.getElementById('uploadBtn').disabled = false;
            document.getElementById('uploadStatus').textContent = '✓ 서버 업로드 완료 — GDB 분석을 시작하세요.';
            // URL에서 ?file 파라미터 제거 (새로고침 시 재진입 방지)
            history.replaceState({}, document.title, window.location.pathname);
        }
    });

    function onCoreFileSelect(input) {
        var file = input.files[0];
        if (!file) return;
        _preloadedFilename = null; // 새 파일 선택 시 preload 해제
        document.getElementById('coreFileName').textContent = file.name;
        document.getElementById('coreDropZone').classList.add('has-file');
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('uploadStatus').textContent = '';
    }

    function onExecFileSelect(input) {
        var file = input.files[0];
        if (!file) return;
        document.getElementById('execFileName').textContent = file.name;
        document.getElementById('execDropZone').classList.add('has-file');
    }

    // 드래그앤드롭
    ['coreDropZone', 'execDropZone'].forEach(function(zoneId) {
        var zone = document.getElementById(zoneId);
        zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
        zone.addEventListener('drop', function(e) {
            e.preventDefault();
            zone.classList.remove('dragover');
            var file = e.dataTransfer.files[0];
            if (!file) return;
            if (zoneId === 'coreDropZone') {
                document.getElementById('coreFileName').textContent = file.name;
                zone.classList.add('has-file');
                document.getElementById('uploadBtn').disabled = false;
                var dt = new DataTransfer();
                dt.items.add(file);
                document.getElementById('coreFileInput').files = dt.files;
            } else {
                document.getElementById('execFileName').textContent = file.name;
                zone.classList.add('has-file');
                var dt2 = new DataTransfer();
                dt2.items.add(file);
                document.getElementById('execFileInput').files = dt2.files;
            }
        });
    });

    function startUpload() {
        // 이미 서버에 업로드된 파일인 경우 바로 분석 페이지로 이동
        if (_preloadedFilename) {
            window.location.href = '/core-dump/progress/' + encodeURIComponent(_preloadedFilename);
            return;
        }
        var coreInput = document.getElementById('coreFileInput');
        if (!coreInput.files || !coreInput.files[0]) {
            alert('코어 덤프 파일을 선택해주세요.');
            return;
        }
        var btn = document.getElementById('uploadBtn');
        btn.disabled = true;
        btn.innerHTML = '업로드 중...';

        // 이전 에러 초기화
        var errorBox = document.getElementById('uploadErrorBox');
        errorBox.classList.remove('visible');

        var fd = new FormData();
        fd.append('coreFile', coreInput.files[0]);
        var execInput = document.getElementById('execFileInput');
        if (execInput.files && execInput.files[0]) fd.append('execFile', execInput.files[0]);

        var csrfMeta  = document.querySelector('meta[name="_csrf"]');
        var csrfHMeta = document.querySelector('meta[name="_csrf_header"]');
        var headers = {};
        if (csrfMeta && csrfHMeta) headers[csrfHMeta.content] = csrfMeta.content;

        var progressBar  = document.getElementById('uploadProgress');
        var progressFill = document.getElementById('uploadProgressFill');
        var statusEl     = document.getElementById('uploadStatus');

        progressBar.classList.add('visible');
        progressFill.style.width = '30%';
        statusEl.textContent = '파일 업로드 중...';

        fetch('/api/core-dump/upload', { method: 'POST', headers: headers, body: fd })
            .then(function(r) {
                if (!r.ok) return r.json().then(function(d) { throw new Error(d.message || '서버 오류 (' + r.status + ')'); });
                return r.json();
            })
            .then(function(d) {
                progressFill.style.width = '100%';
                statusEl.textContent = '업로드 완료! 분석 페이지로 이동합니다...';
                setTimeout(function() {
                    window.location.href = '/core-dump/progress/' + encodeURIComponent(d.filename);
                }, 500);
            })
            .catch(function(e) {
                progressBar.classList.remove('visible');
                progressFill.style.width = '0%';
                statusEl.textContent = '';
                document.getElementById('uploadErrorMsg').textContent = e.message;
                errorBox.classList.add('visible');
                btn.disabled = false;
                btn.innerHTML = '&#128269; GDB 분석 시작';
            });
    }

    function reanalyze(filename, btn) {
        if (btn) { btn.disabled = true; btn.textContent = '요청 중...'; }
        var csrfToken  = document.querySelector('meta[name="_csrf"]') && document.querySelector('meta[name="_csrf"]').content;
        var csrfHeader = document.querySelector('meta[name="_csrf_header"]') && document.querySelector('meta[name="_csrf_header"]').content;
        var headers = { 'Content-Type': 'application/json' };
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
        fetch('/api/core-dump/reanalyze/' + encodeURIComponent(filename), { method: 'POST', headers: headers })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.status === 'ok') {
                    window.location.href = '/core-dump/progress/' + encodeURIComponent(filename);
                } else {
                    alert('재분석 요청 실패: ' + (d.message || '알 수 없는 오류'));
                    if (btn) { btn.disabled = false; btn.innerHTML = '&#8635; 재분석'; }
                }
            })
            .catch(function(e) {
                alert('재분석 중 오류: ' + e.message);
                if (btn) { btn.disabled = false; btn.innerHTML = '&#8635; 재분석'; }
            });
    }

    function deleteDump(filename) {
        if (!confirm('"' + filename + '" 파일과 분석 결과를 삭제하시겠습니까?')) return;

        var csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
        var csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        var headers = { 'Content-Type': 'application/json' };
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        fetch('/api/core-dump/' + encodeURIComponent(filename), { method: 'DELETE', headers: headers })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.status === 'ok') window.location.reload();
                else alert('삭제 실패: ' + (d.message || '알 수 없는 오류'));
            })
            .catch(function(e) { alert('삭제 중 오류: ' + e.message); });
    }
</script>

</body>
</html>

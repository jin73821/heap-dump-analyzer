<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- 좌측 시스템 배너 fragment — 모든 페이지에서 th:replace 로 삽입 -->
<div th:fragment="banner">

<script>
/* 렌더링 전 즉시 실행 — 접힌 상태 깜빡임 방지 */
if (localStorage.getItem('bannerCollapsed') === 'true') {
    document.body.classList.add('banner-collapsed');
}
document.body.classList.add('banner-no-transition');
</script>
<style>
/* ── Left Banner (global, fixed) ─────────────────────── */
:root { --banner-w: 220px; }
body.banner-collapsed { --banner-w: 44px; }

.g-banner {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: var(--banner-w); background: #F0F1F3;
    border-right: none; box-shadow: 1px 0 3px rgba(0,0,0,.06);
    z-index: 110; overflow-y: auto; overflow-x: hidden;
    font-size: 14px; line-height: 1.5;
    display: flex; flex-direction: column;
    transition: width .25s cubic-bezier(.4,0,.2,1);
}

/* ── Banner header (52px, aligned with page topbar) ── */
.gb-header {
    height: 52px; min-height: 52px; display: flex; align-items: center; gap: 10px;
    padding: 0 14px; background: #F0F1F3; border-bottom: none;
    overflow: hidden; white-space: nowrap;
}
.gb-header-logo {
    width: 30px; height: 30px; min-width: 30px; background: #2563EB; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.gb-header-logo svg { width: 18px; height: 18px; }
.gb-header-text { overflow: hidden; }
.gb-header-title { font-size: 14px; font-weight: 700; color: #1F2937; line-height: 1.2; }
.gb-header-sub { font-size: 10px; color: #9CA3AF; font-weight: 500; }
body.banner-collapsed .gb-header { justify-content: center; padding: 0; }
body.banner-collapsed .gb-header-text { display: none; }

/* ── Toggle button ──────────────────────────── */
.gb-toggle {
    position: absolute; top: 62px; right: 8px;
    width: 28px; height: 28px; border-radius: 6px;
    background: #fff; border: 1px solid #E5E7EB;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .25s, background .15s;
    z-index: 2;
}
.gb-toggle:hover { background: #EFF6FF; border-color: #93C5FD; }
.gb-toggle svg { width: 14px; height: 14px; stroke: #6B7280; fill: none; stroke-width: 2; }
body.banner-collapsed .gb-toggle {
    position: static; margin: 6px auto 0; transform: rotate(180deg);
    width: 26px; height: 26px;
}

/* ── Banner content (hidden when collapsed) ── */
.gb-body { padding: 42px 12px 14px; display: flex; flex-direction: column; gap: 16px; }
body.banner-collapsed .gb-body { display: none; }

/* ── Collapsed icon strip ───────────────────── */
.gb-collapsed-icons {
    display: none; flex-direction: column; align-items: center;
    gap: 2px; padding: 4px 0 8px; margin-top: auto;
}
body.banner-collapsed .gb-collapsed-icons { display: flex; }
.gb-ci {
    width: 28px; height: 28px; border-radius: 5px; display: flex;
    align-items: center; justify-content: center; color: #6B7280;
    text-decoration: none; transition: background .15s;
}
.gb-ci:hover { background: #EFF6FF; color: #2563EB; }
.gb-ci svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.gb-ci-dot { width: 7px; height: 7px; border-radius: 50%; margin: 2px 0; }

/* ── Section styles ──────────────────────────── */
.gb-section { }
.gb-title { font-size: 9px; font-weight: 700; color: #9CA3AF;
            text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between; }
.gb-refresh {
    width: 22px; height: 22px; border: none; background: none; cursor: pointer;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    color: #9CA3AF; transition: color .15s, background .15s;
}
.gb-refresh:hover { color: #2563EB; background: #EFF6FF; }
.gb-refresh svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
.gb-refresh.spinning svg { animation: gbSpin .6s linear; }
@keyframes gbSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.gb-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 8px;
           padding: 10px 12px; margin-bottom: 8px; }
.gb-card:last-child { margin-bottom: 0; }
.gb-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.gb-row:last-child { margin-bottom: 0; }
.gb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.gb-dot.green { background: #059669; }
.gb-dot.red { background: #EF4444; }
.gb-dot.amber { background: #F59E0B; }
.gb-label { font-size: 11px; color: #6B7280; }
.gb-val { font-size: 11px; font-weight: 600; color: #1F2937; }
.gb-bar-wrap { width: 100%; height: 6px; background: #E5E7EB; border-radius: 3px; overflow: hidden; }
.gb-bar { height: 100%; border-radius: 3px; transition: width .4s ease; }
.gb-bar.blue { background: #2563EB; }
.gb-bar.green { background: #059669; }
.gb-bar.amber { background: #F59E0B; }
.gb-bar.red { background: #EF4444; }
.gb-sub { font-size: 10px; color: #9CA3AF; margin-top: 3px; }
.gb-nav-link { display: flex; align-items: center; gap: 8px;
               padding: 8px 10px; border-radius: 6px; color: #374151;
               text-decoration: none; font-size: 12px; font-weight: 500;
               transition: background .15s; }
.gb-nav-link:hover { background: #EFF6FF; color: #2563EB; }
.gb-nav-link.active { background: #EFF6FF; color: #2563EB; font-weight: 600; }
.gb-nav-link svg { width: 16px; height: 16px; stroke: currentColor;
                   fill: none; stroke-width: 1.8; flex-shrink: 0; }
/* ── Sub-menu ────────────────────────────────── */
.gb-nav-sub { overflow: hidden; max-height: 0; transition: max-height .25s ease; }
.gb-nav-sub.open { max-height: 200px; }
.gb-nav-sub a { display: flex; align-items: center; gap: 6px;
                padding: 5px 10px 5px 34px; border-radius: 5px; color: #6B7280;
                text-decoration: none; font-size: 11px; font-weight: 500;
                transition: background .15s; }
.gb-nav-sub a:hover { background: #EFF6FF; color: #2563EB; }
.gb-nav-sub a.active { background: #EFF6FF; color: #2563EB; font-weight: 600; }
.gb-nav-sub a svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.gb-nav-toggle { margin-left: auto; width: 14px; height: 14px; stroke: currentColor;
                 fill: none; stroke-width: 2; transition: transform .2s; flex-shrink: 0; }
.gb-nav-link.sub-open .gb-nav-toggle { transform: rotate(90deg); }

/* ── Desktop font scale ──────────────────────── */
@media (min-width: 1024px) {
    .gb-title { font-size: 10px; }
    .gb-label { font-size: 12px; }
    .gb-val { font-size: 12px; }
    .gb-sub { font-size: 11px; }
    .gb-nav-link { font-size: 13px; }
}
/* ── 페이지 로드 시 transition 비활성화 ───────── */
body.banner-no-transition .g-banner,
body.banner-no-transition .gb-header { transition: none !important; }

/* ── Mobile hamburger button (shared across pages) ── */
.gb-menu-btn {
    display: none; width: 32px; height: 32px; border: none; background: none;
    cursor: pointer; padding: 6px; margin-right: 4px; flex-shrink: 0;
    flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
.gb-menu-btn span {
    display: block; width: 16px; height: 2px; background: #374151;
    border-radius: 1px; transition: transform .2s, opacity .15s;
}
.gb-menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(3px, 4px); }
.gb-menu-btn.open span:nth-child(2) { opacity: 0; }
.gb-menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(3px, -4px); }
@media (max-width: 900px) {
    .gb-menu-btn { display: flex; }
}

/* ── Mobile: banner as slide-in drawer ────────── */
@media (max-width: 900px) {
    :root { --banner-w: 0px !important; }
    body.banner-collapsed { --banner-w: 0px !important; }
    .g-banner {
        width: 300px; transform: translateX(-100%);
        transition: transform .3s cubic-bezier(.4,0,.2,1);
        box-shadow: none; z-index: 200;
    }
    .g-banner.mobile-open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(0,0,0,.18);
    }
    body.banner-collapsed .g-banner { width: 300px; }
    body.banner-collapsed .gb-body { display: flex; }
    body.banner-collapsed .gb-collapsed-icons { display: none; }
    .gb-toggle { display: none !important; }

    /* ── Mobile tab bar ──────────────────────────── */
    .gb-mobile-tabs {
        display: flex; border-bottom: 2px solid #E5E7EB; flex-shrink: 0;
        background: #F8F9FA;
    }
    .gb-mobile-tab {
        flex: 1; padding: 10px 0; text-align: center;
        font-size: 12px; font-weight: 600; color: #9CA3AF;
        background: none; border: none; cursor: pointer;
        border-bottom: 2px solid transparent; margin-bottom: -2px;
        transition: color .15s, border-color .15s;
    }
    .gb-mobile-tab.active { color: #2563EB; border-bottom-color: #2563EB; }
    .gb-mobile-tab:hover { color: #374151; }
    .gb-mobile-tab-icon { display: inline-block; width: 14px; height: 14px; vertical-align: -2px; margin-right: 4px; }
    .gb-mobile-tab-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .gb-tab-content { display: none; flex: 1; overflow-y: auto; }
    .gb-tab-content.active { display: flex; flex-direction: column; }

    /* Dynamic tabs hidden by default (only shown when page injects content) */
    .gb-mobile-tab[data-tab="upload"] { display: none; }
    .gb-mobile-tab[data-tab="analysis"] { display: none; }
    .gb-mobile-tab[data-tab="chat"] { display: none; }
    body.has-upload-tab .gb-mobile-tab[data-tab="upload"] { display: block; }
    body.has-analysis-tab .gb-mobile-tab[data-tab="analysis"] { display: block; }
    body.has-chat-tab .gb-mobile-tab[data-tab="chat"] { display: block; }
}
/* ── Desktop: hide mobile elements ──────────────── */
@media (min-width: 901px) {
    .gb-mobile-tabs { display: none; }
    .gb-tab-content.gb-tab-nav { display: flex; flex-direction: column; }
    .gb-tab-content.gb-tab-upload { display: none; }
    .gb-tab-content.gb-tab-analysis { display: none; }
    .gb-tab-content.gb-tab-chat { display: none; }
    .gb-banner-overlay { display: none !important; }
}
/* ── Banner mobile overlay ──────────────────────── */
.gb-banner-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4); z-index: 199;
}
.gb-banner-overlay.open { display: block; }
</style>

            <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;color:#6B7280">
                <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

<div class="gb-banner-overlay" id="gbBannerOverlay" onclick="closeMobileBanner()"></div>

<script>
/* ── Banner toggle + system status ─────────── */
var _GB_CACHE_KEY = 'bannerStatusCache';
var _GB_INTERVAL = 60000; // 1분

(function() {
    highlightActiveNav();

    // 모바일: 내비게이션 링크 클릭 시 배너 자동 닫기
    var navLinks = document.querySelectorAll('.gb-nav-link:not([onclick*="toggleSubMenu"]), .gb-nav-sub a');
    navLinks.forEach(function(link) {
        link.addEventListener('click', function() {
            if (window.innerWidth <= 900) closeMobileBanner();
        });
    });

    // 로드 완료 후 transition 복원
    requestAnimationFrame(function() {
        requestAnimationFrame(function() {
            document.body.classList.remove('banner-no-transition');
        });
    });

    // 캐시된 데이터로 즉시 렌더링 (페이지 이동 시 깜빡임 방지)
    var cached = loadStatusCache();
    if (cached) {
        applyBannerStatus(cached);
    }

    // 캐시가 60초 이상 오래됐으면 API 호출, 아니면 다음 주기까지 대기
    var age = getCacheAge();
    if (age < 0 || age >= _GB_INTERVAL) {
        fetchBannerStatus();
    }
    setInterval(fetchBannerStatus, _GB_INTERVAL);
})();

function toggleBanner() {
    document.body.classList.toggle('banner-collapsed');
    localStorage.setItem('bannerCollapsed', document.body.classList.contains('banner-collapsed'));
}

/* ── Mobile banner drawer ─────────────────────── */
function openMobileBanner() {
    var banner = document.getElementById('gBanner');
    var ov = document.getElementById('gbBannerOverlay');
    if (banner) banner.classList.add('mobile-open');
    if (ov) ov.classList.add('open');
    // 햄버거 버튼 X 전환
    var btn = document.getElementById('menuBtn');
    if (btn) btn.classList.add('open');
}
function closeMobileBanner() {
    var banner = document.getElementById('gBanner');
    var ov = document.getElementById('gbBannerOverlay');
    if (banner) banner.classList.remove('mobile-open');
    if (ov) ov.classList.remove('open');
    var btn = document.getElementById('menuBtn');
    if (btn) btn.classList.remove('open');
}
function toggleMobileBanner() {
    var banner = document.getElementById('gBanner');
    if (banner && banner.classList.contains('mobile-open')) {
        closeMobileBanner();
    } else {
        openMobileBanner();
    }
}

/* ── Mobile tab switching ─────────────────────── */
function switchBannerTab(tabName) {
    // Tab buttons
    var tabs = document.querySelectorAll('.gb-mobile-tab');
    tabs.forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-tab') === tabName); });
    // Tab contents
    document.querySelectorAll('.gb-tab-content').forEach(function(el) { el.classList.remove('active'); });
    var map = { nav: 'gbBody', upload: 'gbMobileUpload', analysis: 'gbMobileAnalysis', chat: 'gbMobileChat' };
    var target = document.getElementById(map[tabName]);
    if (target) target.classList.add('active');
}

/* ── Register upload content into banner (called by index.html) ── */
function registerBannerUploadTab(contentElement) {
    var slot = document.getElementById('gbMobileUpload');
    if (!slot || !contentElement) return;
    slot.appendChild(contentElement);
    document.body.classList.add('has-upload-tab');
}

/* ── Register analysis content into banner (called by analyze.html) ── */
function registerBannerAnalysisTab(contentElement) {
    var slot = document.getElementById('gbMobileAnalysis');
    if (!slot || !contentElement) return;
    slot.appendChild(contentElement);
    document.body.classList.add('has-analysis-tab');
}

/* ── Register chat session list into banner (called by ai-chat.html) ── */
function registerBannerChatTab(contentElement) {
    var slot = document.getElementById('gbMobileChat');
    if (!slot || !contentElement) return;
    slot.appendChild(contentElement);
    document.body.classList.add('has-chat-tab');
}

function highlightActiveNav() {
    var path = window.location.pathname;
    // 일반 메뉴 하이라이트
    var links = document.querySelectorAll('.gb-nav-link');
    links.forEach(function(l) {
        var href = l.getAttribute('href');
        if (href && path === href && href !== '/servers' && href !== '/settings') {
            l.classList.add('active');
        } else if (href && href !== '/' && href !== '/servers' && href !== '/settings' && path.startsWith(href)) {
            l.classList.add('active');
        }
    });
    // 서브 메뉴 하이라이트 + 자동 펼치기
    var subLinks = document.querySelectorAll('.gb-nav-sub a');
    subLinks.forEach(function(a) {
        var href = a.getAttribute('href');
        if (path === href) {
            a.classList.add('active');
        }
    });
    // /servers 경로면 서브 메뉴 펼치기 + 부모 활성화
    if (path.startsWith('/servers')) {
        var serversLink = document.getElementById('gbNavServers');
        var sub = document.getElementById('gbSubServers');
        if (serversLink) serversLink.classList.add('active', 'sub-open');
        if (sub) sub.classList.add('open');
    }
    // /settings 또는 /admin/users 경로면 Settings 서브 메뉴 펼치기 + 부모 활성화
    if (path.startsWith('/settings') || path.startsWith('/admin/users')) {
        var settingsLink = document.getElementById('gbNavSettings');
        var subSettings = document.getElementById('gbSubSettings');
        if (settingsLink) settingsLink.classList.add('active', 'sub-open');
        if (subSettings) subSettings.classList.add('open');
        // 하위 링크 활성화
        if (path === '/settings') {
            var mainLink = document.getElementById('gbNavSettingsMain');
            if (mainLink) mainLink.classList.add('active');
        } else if (path === '/settings/llm') {
            var llmLink = document.getElementById('gbNavSettingsLlm');
            if (llmLink) llmLink.classList.add('active');
        } else if (path === '/settings/rag') {
            var ragLink = document.getElementById('gbNavSettingsRag');
            if (ragLink) ragLink.classList.add('active');
        } else if (path.startsWith('/admin/users')) {
            var accLink = document.getElementById('gbNavSettingsAccounts');
            if (accLink) accLink.classList.add('active');
        }
    }
}

function toggleSubMenu(e, subId) {
    // 서브 메뉴 토글 (링크 이동 방지)
    e.preventDefault();
    var link = e.currentTarget;
    var sub = document.getElementById(subId);
    if (sub) {
        sub.classList.toggle('open');
        link.classList.toggle('sub-open');
    }
}

/* 수동 Refresh 버튼 */
function refreshBannerStatus() {
    var btn = document.getElementById('gbRefreshBtn');
    if (btn) { btn.classList.add('spinning'); }
    fetchBannerStatus(function() {
        if (btn) { setTimeout(function() { btn.classList.remove('spinning'); }, 600); }
    });
}

/* 캐시 읽기/쓰기 */
function loadStatusCache() {
    try {
        var raw = localStorage.getItem(_GB_CACHE_KEY);
        if (!raw) return null;
        return JSON.parse(raw).data;
    } catch(e) { return null; }
}
function saveStatusCache(d) {
    try {
        localStorage.setItem(_GB_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: d }));
    } catch(e) {}
}
function getCacheAge() {
    try {
        var raw = localStorage.getItem(_GB_CACHE_KEY);
        if (!raw) return -1;
        return Date.now() - JSON.parse(raw).ts;
    } catch(e) { return -1; }
}

/* API 호출 */
function fetchBannerStatus(cb) {
    fetch('/api/system/status').then(function(r) { return r.json(); }).then(function(d) {
        saveStatusCache(d);
        applyBannerStatus(d);
        if (cb) cb();
    }).catch(function() { if (cb) cb(); });
}

/* DOM 업데이트 */
function applyBannerStatus(d) {
    // MAT CLI
    var matDot = document.getElementById('gbMatDot');
    var matDotC = document.getElementById('gbMatDotC');
    var matVal = document.getElementById('gbMatVal');
    if (matDot) matDot.className = 'gb-dot ' + (d.matCliReady ? 'green' : 'red');
    if (matDotC) matDotC.style.background = d.matCliReady ? '#059669' : '#EF4444';
    if (matVal) {
        matVal.textContent = d.matCliReady ? 'Ready' : 'Not Ready';
        matVal.style.color = d.matCliReady ? '#059669' : '#EF4444';
    }

    // Disk
    var diskPct = d.diskUsedPercent || 0;
    var dp = document.getElementById('gbDiskPct');
    var db = document.getElementById('gbDiskBar');
    var ds = document.getElementById('gbDiskSub');
    if (dp) {
        dp.textContent = diskPct + '%';
        dp.style.color = diskPct > 90 ? '#EF4444' : (diskPct > 70 ? '#F59E0B' : '');
    }
    if (db) {
        db.style.width = diskPct + '%';
        db.className = 'gb-bar ' + (diskPct > 90 ? 'red' : (diskPct > 70 ? 'amber' : 'blue'));
    }
    if (ds) ds.textContent = (d.diskUsed || '-') + ' / ' + (d.diskTotal || '-');

    // JVM
    var jvmPct = d.jvmUsedPercent || 0;
    var jp = document.getElementById('gbJvmPct');
    var jb = document.getElementById('gbJvmBar');
    var js_el = document.getElementById('gbJvmSub');
    if (jp) {
        jp.textContent = jvmPct + '%';
        jp.style.color = jvmPct > 90 ? '#EF4444' : (jvmPct > 70 ? '#F59E0B' : '');
    }
    if (jb) {
        jb.style.width = jvmPct + '%';
        jb.className = 'gb-bar ' + (jvmPct > 90 ? 'red' : (jvmPct > 70 ? 'amber' : 'green'));
    }
    if (js_el) js_el.textContent = (d.jvmUsedMb || 0) + ' / ' + (d.jvmMaxMb || 0) + ' MB';

    // Queue
    var qDot = document.getElementById('gbQueueDot');
    var qVal = document.getElementById('gbQueueVal');
    var qSize = d.queueSize || 0;
    var current = d.currentAnalysis || null;
    if (qDot && qVal) {
        if (qSize === 0 && !current) {
            qDot.className = 'gb-dot green';
            qVal.textContent = 'Idle';
            qVal.style.color = '';
        } else if (current && qSize <= 1) {
            qDot.className = 'gb-dot amber';
            qVal.textContent = 'Running';
            qVal.style.color = '#F59E0B';
        } else {
            qDot.className = 'gb-dot amber';
            qVal.textContent = 'Running +' + (qSize - 1) + ' queued';
            qVal.style.color = '#F59E0B';
        }
    }
}
</script>

</div>
